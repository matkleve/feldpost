name: Build & Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/web/**"
      - "supabase/functions/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-and-test.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "supabase/functions/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-and-test.yml"

jobs:
  web:
    name: Angular build & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npx ng build

      - name: Unit tests
        working-directory: apps/web
        run: npx ng test --watch=false

  edge-functions:
    name: Edge function (Deno) tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run geocode tests
        run: deno test supabase/functions/geocode/
