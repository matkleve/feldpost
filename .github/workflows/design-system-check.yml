name: Design System Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/design/design-system/**"
      - "docs/design/tokens.md"
      - "scripts/audit-panel-breakpoints.mjs"
      - "scripts/validate-design-system-registry.mjs"
      - "scripts/guard-visual-behavior.mjs"
      - "scripts/guard-interaction-emphasis.mjs"
      - "scripts/lint-design-tokens.mjs"
      - "apps/web/src/styles.scss"
      - "apps/web/src/styles/**"
      - "apps/web/src/app/**/*.scss"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/design-system-check.yml"
  push:
    branches:
      - main
    paths:
      - "docs/design/design-system/**"
      - "docs/design/tokens.md"
      - "scripts/audit-panel-breakpoints.mjs"
      - "scripts/validate-design-system-registry.mjs"
      - "scripts/guard-visual-behavior.mjs"
      - "scripts/guard-interaction-emphasis.mjs"
      - "scripts/lint-design-tokens.mjs"
      - "apps/web/src/styles.scss"
      - "apps/web/src/styles/**"
      - "apps/web/src/app/**/*.scss"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/design-system-check.yml"

jobs:
  design-system-check:
    name: Design System Contract Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run design system checks
        run: npm run design-system:check
