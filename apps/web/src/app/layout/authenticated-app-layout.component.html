<!-- Sidebar: only mounted when authGuard passes (this layout route). -->
<app-nav />

<div class="authenticated-app-layout__main">
  <div
    class="authenticated-app-layout__map-host"
    [class.authenticated-app-layout__map-host--visible]="mapShellVisible()"
  >
    <app-map-shell />
  </div>
  <div
    class="authenticated-app-layout__shell-outlet"
    [class.authenticated-app-layout__shell-outlet--map-active]="mapShellVisible()"
  >
    <router-outlet />
  </div>
</div>

@if (photoPanelOpen()) {
  <app-drag-divider
    [currentWidth]="workspacePaneWidth()"
    [minWidth]="workspacePaneMinWidth()"
    [maxWidth]="workspacePaneMaxWidth()"
    [defaultWidth]="workspacePaneDefaultWidth()"
    (widthChange)="onWorkspaceWidthChange($event)"
  />
  <app-workspace-pane
    [currentWidth]="workspacePaneWidth()"
    [activeTab]="workspacePaneActiveTab()"
    [detailMediaId]="detailMediaId()"
    [detailAddressSearchRequestMediaId]="detailAddressSearchRequest()?.mediaId ?? null"
    [detailAddressSearchRequestId]="detailAddressSearchRequest()?.requestId ?? 0"
    [linkedHoveredMediaIds]="linkedHoveredWorkspaceMediaIds()"
    (activeTabChange)="onWorkspacePaneActiveTabChange($event)"
    (closed)="closeWorkspacePane()"
    (detailClosed)="closeDetailView()"
    (detailAddressSearchRequestConsumed)="onDetailAddressSearchRequestConsumed($event)"
    (detailRequested)="openDetailView($event)"
    (zoomToLocationRequested)="onZoomToLocationRequested($event)"
    (uploadLocationMapPickRequested)="onUploadLocationMapPickRequestedFromWorkspacePane($event)"
    (workspaceItemHoverStarted)="onWorkspaceItemHoverStartedFromPane($event)"
    (workspaceItemHoverEnded)="onWorkspaceItemHoverEndedFromPane($event)"
  >
    <app-upload-panel
      data-workspace-upload-tab
      [visible]="true"
      [embeddedInPane]="true"
      (imageUploaded)="onImageUploadedFromWorkspacePane($event)"
      (detailRequested)="openDetailView($event)"
      (zoomToLocationRequested)="onZoomToLocationRequested($event)"
      (placementRequested)="enterPlacementModeFromWorkspacePane($event)"
      (locationPreviewRequested)="onUploadLocationPreviewRequestedFromWorkspacePane($event)"
      (locationPreviewCleared)="onUploadLocationPreviewClearedFromWorkspacePane()"
      (locationMapPickRequested)="onUploadLocationMapPickRequestedFromWorkspacePane($event)"
    />
  </app-workspace-pane>
}
