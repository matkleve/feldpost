<main class="projects-page content-clamp content-clamp--wide" data-i18n-skip>
  <app-projects-sidebar
    [projects]="sidebarProjects()"
    [selectedProjectId]="currentProjectId()"
    [showArchived]="showArchived()"
    [dashboardActive]="!currentProjectId()"
    [loading]="loading()"
    [searchQuery]="searchQuery()"
    [filterOptions]="filterOptions()"
    [sortOptions]="sortOptions()"
    [activeSorts]="activeSorts()"
    [hasFilters]="hasFilters()"
    [hasCustomSort]="hasCustomSort()"
    (dashboardSelected)="onDashboardSelected()"
    (projectSelected)="onProjectSelected($event)"
    (projectArchiveRequested)="onArchiveProject($event)"
    (projectRestoreRequested)="onRestoreProject($event)"
    (projectDeleteRequested)="onDeleteProject($event)"
    (archiveToggled)="onArchiveToggled()"
    (searchQueryChange)="onSearchQueryChange($event)"
    (sortChanged)="onSortChanged($event)"
    (newProject)="onNewProject()"
  />

  @if (loadError()) {
    <section class="projects-page__center projects-page__error" role="alert">
      <h2>{{ t('projects.page.error.title', 'Could not load projects') }}</h2>
      <p>{{ t('projects.page.error.body', 'Please try again in a moment.') }}</p>
      <button hlmBtn variant="outline" type="button" (click)="refreshProjects()">
        {{ t('projects.page.error.retry', 'Retry') }}
      </button>
    </section>
  } @else if (currentProjectId() && currentProject(); as project) {
    <section class="projects-page__center">
      <app-project-detail-view
        [project]="project"
        [detailsPanelOpen]="detailsPanelOpen()"
        [exclusiveMedia]="exclusiveMedia()"
        [sharedMedia]="sharedMedia()"
        [mediaLoading]="mediaLoading()"
        (detailsToggled)="onDetailsToggled()"
        (titleRenamed)="onProjectTitleRenamed($event)"
        (mediaAdded)="onMediaAdded($event)"
        (mediaRemoved)="onMediaRemoved($event)"
      />
    </section>

    @if (detailsPanelOpen()) {
      <app-project-details-panel
        [project]="project"
        [colorPickerOpen]="colorPickerOpen()"
        (colorSelected)="onColorSelected(project.id, $event)"
        (colorPickerToggled)="onColorPickerToggled()"
        (archiveRequested)="onArchiveProject(project.id)"
        (restoreRequested)="onRestoreProject(project.id)"
        (deleteRequested)="requestDeleteProject(project.id)"
        (closed)="onDetailsPanelClosed()"
      />
    }
  } @else {
    <section class="projects-page__center">
      <app-project-dashboard-view [projects]="projects()" />
    </section>
  }

  <app-projects-confirm-dialog
    [open]="hasPendingAction()"
    [title]="pendingActionTitle()"
    [message]="pendingActionMessage()"
    [confirmLabel]="pendingActionConfirmLabel()"
    [cancelLabel]="t('common.cancel', 'Cancel')"
    [busy]="pendingActionBusy()"
    [danger]="pendingProjectAction() === 'delete'"
    (cancel)="cancelPendingAction()"
    (confirm)="confirmPendingAction()"
  />

  @if (projectNameDialogOpen()) {
    <app-text-input-dialog
      [title]="t('projects.page.action.newProject', 'New project')"
      [message]="t('map.shell.dialog.projectName.message', 'Enter a project name.')"
      [placeholder]="t('map.shell.dialog.projectName.placeholder', 'e.g. Radius Selection North')"
      [confirmLabel]="t('map.shell.dialog.projectName.confirm', 'Create project')"
      [cancelLabel]="t('map.shell.dialog.cancel', 'Cancel')"
      (cancelled)="onProjectNameDialogCancelled()"
      (confirmed)="onProjectNameDialogConfirmed($event)"
    />
  }
</main>
