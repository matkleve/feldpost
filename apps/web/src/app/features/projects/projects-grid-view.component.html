<app-card-grid class="projects-grid" minColumnWidth="16rem" [variant]="cardVariant()">
  @for (project of section().projects; track project.id) {
    <app-project-card
      [project]="project"
      [variant]="cardVariant()"
      [colorTokenFor]="colorTokenFor()"
      [formatRelativeDate]="formatRelativeDate()"
      (colorSelected)="onColorSelected($event.projectId, $event.colorKey)"
      (dangerAction)="onDangerAction($event.projectId, $event.action)"
    />
  }
</app-card-grid>
