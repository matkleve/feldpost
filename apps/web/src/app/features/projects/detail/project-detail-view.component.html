<section class="project-detail">
  @if (project(); as p) {
    <header class="project-detail__header">
      <div class="project-detail__title-row">
        <span class="project-detail__dot" [style.background]="colorFor(p.colorKey)"></span>
        <div class="project-detail__title-group">
          @if (editingTitle()) {
            <input
              #titleInput
              hlmInput
              class="project-detail__title-input"
              type="text"
              [value]="titleDraft()"
              [attr.maxlength]="projectNameMaxLength"
              [attr.aria-label]="t('projects.page.action.renameProject', 'Rename project')"
              (input)="onTitleDraftInput($event)"
              (keydown.enter)="submitTitle()"
              (keydown.escape)="cancelTitleEdit()"
              (blur)="submitTitle()"
            />
          } @else {
            <h1 class="project-detail__title">{{ p.name }}</h1>
            @if (!namingNewProject()) {
              <button
                type="button"
                hlmBtn
                variant="ghost"
                size="icon"
                class="project-detail__edit-btn"
                [attr.aria-label]="t('projects.page.action.renameProject', 'Rename project')"
                [attr.title]="t('projects.page.action.renameProject', 'Rename project')"
                (click)="startTitleEdit()"
              >
                <span class="material-icons" aria-hidden="true">edit</span>
              </button>
            }
          }
        </div>
        <app-chip
          [decorative]="true"
          [variant]="statusChipVariant(p.status)"
          [icon]="statusChipIcon(p.status)"
          [text]="statusLabel(p.status)"
        />
      </div>

      <div class="project-detail__meta-row">
        <p class="project-detail__meta">
          {{ locationLabel(p) }} · {{ t('projects.detail.updated', 'updated') }} {{ relativeDate(p.lastActivity) }}
        </p>
        <button
          type="button"
          hlmBtn
          variant="ghost"
          size="sm"
          class="project-detail__details-btn"
          [attr.aria-expanded]="detailsPanelOpen()"
          (click)="detailsToggled.emit()"
        >
          <span class="material-icons" aria-hidden="true">info</span>
          <span>{{ t('projects.detail.detailsButton', 'Details') }}</span>
        </button>
      </div>

      <app-pane-toolbar
        class="project-detail__media-toolbar"
        role="toolbar"
        [attr.aria-label]="t('projects.media.toolbar.aria', 'Project media actions')"
      >
        <div slot="left" class="project-detail__media-actions">
          <button type="button" hlmBtn variant="outline" size="sm" (click)="onUploadMedia()">
            <span class="material-icons" aria-hidden="true">upload</span>
            <span>{{ t('projects.media.uploadButton', 'Upload media') }}</span>
          </button>
          <button type="button" hlmBtn variant="outline" size="sm" (click)="openPicker()">
            <span class="material-icons" aria-hidden="true">add</span>
            <span>{{ t('projects.media.addButton', 'Add media') }}</span>
          </button>
        </div>

        <div slot="right" class="project-detail__view-toggle">
          <div class="project-detail__size-control project-detail__size-control--full" hlmPillToggle size="sm">
            <div
              hlmToggleGroup
              size="sm"
              brnToggleGroup
              type="single"
              [nullable]="false"
              [value]="cardVariant()"
              (valueChange)="onCardVariantToggleChange($event)"
              [attr.aria-label]="t('workspace.toolbar.size.aria', 'Thumbnail size')"
            >
              @for (opt of cardVariantToggleOptions(); track opt.id) {
                <button
                  type="button"
                  hlmToggleGroupItem
                  size="icon"
                  brnToggleGroupItem
                  [value]="opt.id"
                  [attr.aria-label]="opt.ariaLabel || opt.label"
                  [attr.title]="opt.title || opt.label"
                >
                  <span class="material-icons" aria-hidden="true">{{ opt.icon }}</span>
                </button>
              }
            </div>
          </div>

          <div class="project-detail__size-control project-detail__size-control--compact">
            <div class="project-detail__size-control-track" hlmToggleGroup size="sm">
              <button
                type="button"
                hlmToggleGroupItem
                brnToggleGroupItem
                size="icon"
                [attr.aria-label]="compactCardVariantToggleTitle()"
                [attr.title]="compactCardVariantToggleTitle()"
                (click)="cycleCardVariant()"
              >
                <span class="material-icons" aria-hidden="true">
                  {{ currentCardVariantToggleOption()?.icon }}
                </span>
              </button>
            </div>
          </div>
        </div>
      </app-pane-toolbar>
    </header>

    <app-project-media-section
      class="project-detail__content"
      [exclusive]="exclusiveMedia()"
      [shared]="sharedMedia()"
      [loading]="mediaLoading()"
      [displayMode]="itemDisplayMode()"
      (mediaRemoved)="mediaRemoved.emit($event)"
    />
  }
</section>

@if (pickerOpen()) {
  <app-media-picker-dialog
    [excludeMediaIds]="assignedMediaIds()"
    (confirmed)="onPickerConfirmed($event)"
    (cancelled)="onPickerCancelled()"
  />
}
