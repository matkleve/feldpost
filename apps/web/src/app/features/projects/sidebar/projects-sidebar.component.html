<div class="projects-sidebar">
  <app-page-rail-title [title]="t('projects.page.title', 'Projects')" />

  <button
    type="button"
    hlmBtn
    variant="ghost"
    size="sm"
    class="projects-sidebar__dashboard"
    [class.projects-sidebar__dashboard--active]="dashboardActive()"
    (click)="dashboardSelected.emit()"
  >
    <span class="material-icons" aria-hidden="true">dashboard</span>
    <span>{{ t('projects.sidebar.dashboard', 'Dashboard') }}</span>
  </button>

  <app-rail-search-field
    [value]="searchQuery()"
    [placeholder]="t('projects.sidebar.search.placeholder', 'Search projects…')"
    [ariaLabel]="t('projects.page.search.aria', 'Project search')"
    (valueChange)="onSearchInput($event)"
  />

  <div
    class="projects-sidebar__toolbar"
    role="toolbar"
    [attr.aria-label]="t('projects.toolbar.aria.controls', 'Project controls')"
  >
    @for (btn of toolbarButtons(); track btn.id) {
      <button
        type="button"
        hlmBtn
        variant="outline"
        size="sm"
        class="projects-sidebar__toolbar-btn"
        [class.projects-sidebar__toolbar-btn--open]="activeDropdown() === btn.id"
        [attr.data-active]="btn.active ? 'true' : null"
        [attr.aria-label]="btn.label"
        [attr.title]="btn.label"
        [attr.aria-expanded]="activeDropdown() === btn.id"
        [attr.aria-haspopup]="true"
        (click)="toggleDropdown(btn.id, $event)"
      >
        <span class="material-icons projects-sidebar__toolbar-icon" aria-hidden="true">{{ btn.icon }}</span>
      </button>
    }

    <span class="projects-sidebar__toolbar-spacer" aria-hidden="true"></span>

    <button
      type="button"
      hlmBtn
      variant="outline"
      size="icon"
      class="projects-sidebar__archive"
      [class.projects-sidebar__archive--active]="showArchived()"
      [attr.aria-pressed]="showArchived()"
      [attr.aria-label]="
        showArchived()
          ? t('projects.sidebar.archive.showActive', 'Show active projects')
          : t('projects.sidebar.archive.showArchived', 'Show archived projects')
      "
      [attr.title]="
        showArchived()
          ? t('projects.sidebar.archive.showActive', 'Show active projects')
          : t('projects.sidebar.archive.showArchived', 'Show archived projects')
      "
      (click)="archiveToggled.emit()"
    >
      <span class="material-icons" aria-hidden="true">inventory_2</span>
    </button>
  </div>

  <app-rail-select-list
    [items]="projectListItems()"
    [selectedId]="selectedProjectId()"
    [loading]="loading()"
    [listAriaLabel]="t('projects.sidebar.list.aria', 'Projects')"
    [loadingMessage]="t('projects.page.loading.aria', 'Loading projects')"
    [emptyMessage]="projectListEmptyMessage()"
    (itemSelected)="onProjectClick($event)"
    (actionTriggered)="onProjectListAction($event)"
  />

  <div class="projects-sidebar__footer">
    <button type="button" hlmBtn variant="outline" size="sm" class="projects-sidebar__new" (click)="newProject.emit()">
      <span class="material-icons" aria-hidden="true">add</span>
      <span>{{ t('projects.page.action.newProject', 'New project') }}</span>
    </button>
  </div>
</div>

<app-toolbar-dropdown-stack
  [activePanelId]="activeDropdown()"
  [anchor]="dropdownAnchor()"
  [outsideCloseEnabled]="!isDragging()"
  (closeRequested)="closeDropdown()"
>
  @switch (activeDropdown()) {
    @case ('filter') {
      <app-filter-dropdown [propertyOptionsInput]="filterOptions()" />
    }
    @case ('sort') {
      <app-sort-dropdown
        [optionsInput]="sortOptions()"
        [activeSortsInput]="activeSorts()"
        [defaultSorts]="[]"
        (sortChanged)="onSortChanged($event)"
      />
    }
  }
</app-toolbar-dropdown-stack>
