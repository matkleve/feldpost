<app-page-grid
  [leftRail]="true"
  [rightRailOpen]="true"
  [centerExpanded]="false"
  data-i18n-skip
>
  <app-member-list
    pageGridLeft
    [members]="membersWithPresence()"
    [selectedMemberId]="selectedMemberId()"
    [channels]="channels()"
    [selectedChannelId]="selectedChannelId()"
    [loading]="loading()"
    [activeTab]="sidebarTab()"
    [canManageChannels]="canManageChannels()"
    (tabChange)="onTabChange($event)"
    (memberSelected)="onMemberSelected($event)"
    (channelSelected)="onChannelSelected($event)"
    (memberMessageRequested)="onMessageMember($event)"
    (channelCreateRequested)="onChannelCreate($event)"
    (channelArchiveRequested)="onChannelArchive($event)"
    (channelMemberInviteRequested)="onChannelMemberInvite($event)"
  />

  <section pageGridCenter class="colleagues-page__center">
    @if (loadError()) {
      <div role="alert" class="colleagues-page__error">
        <h2>{{ t('colleagues.page.error.title', 'Could not load colleagues') }}</h2>
        <p>{{ loadError() }}</p>
      </div>
    } @else if (sidebarTab() === 'invites') {
      <app-colleagues-invites-panel class="colleagues-page__invites-center" />
    } @else {
      <app-chat-area
        [channel]="selectedChannel()"
        [messages]="chatService.liveMessages()"
        [typingUserIds]="chatService.typingUserIds()"
        [searchResults]="chatService.searchResults()"
        [canDeleteAny]="canDeleteAnyMessage()"
        (messageSent)="chatService.sendMessage($event)"
        (typing)="chatService.broadcastTyping(selectedChannelId()!)"
        (searchRequested)="chatService.searchMessages($event)"
        (messageEdited)="onMessageEdited($event)"
        (messageDeleted)="onMessageDeleted($event)"
        (reactionToggled)="onReactionToggled($event)"
      />
    }
  </section>

  @if (selectedMember(); as member) {
    <app-member-detail-panel
      pageGridRight
      [member]="member"
      [roles]="roles()"
      [ownRoleLevel]="ownRoleLevel()"
      (closed)="onMemberPanelClosed()"
      (messageRequested)="onMessageMember($event)"
      (memberUpdated)="onMemberUpdated()"
    />
  } @else {
    <aside pageGridRight class="colleagues-page__detail-empty">
      <p>{{ t('colleagues.member.select_hint', 'Select a colleague to view details.') }}</p>
    </aside>
  }
</app-page-grid>
