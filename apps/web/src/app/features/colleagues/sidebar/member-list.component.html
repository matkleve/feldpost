<app-page-rail [ariaLabel]="t('colleagues.sidebar.label', 'Messaging')">
  <app-page-rail-title
    pageRailTitle
    icon="forum"
    [title]="t('colleagues.page.title', 'Messaging')"
  />

  <app-rail-nav-button
    pageRailNav
    icon="link"
    [label]="t('colleagues.tab.invites', 'Invites')"
    [active]="invitesActive()"
    (clicked)="onInvitesClick()"
  />

  <app-rail-search-field
    pageRailSearch
    [value]="searchQuery()"
    [placeholder]="t('colleagues.sidebar.search.placeholder', 'Search messaging…')"
    [ariaLabel]="t('colleagues.sidebar.search.aria', 'Search channels and direct messages')"
    (valueChange)="searchQuery.set($event)"
  />

  <div pageRailBody>
    <app-rail-section
      icon="tag"
      [label]="t('colleagues.channels.title', 'Channels')"
      [expanded]="channelsExpanded()"
      (expandedChange)="channelsExpanded.set($event)"
      [actionsAriaLabel]="t('colleagues.channels.actions_aria', 'Channel section actions')"
    >
      @if (canManageChannels()) {
        <button
          railSectionActions
          type="button"
          [attr.aria-label]="t('colleagues.channel.create', 'Create channel')"
          [attr.title]="t('colleagues.channel.create', 'Create channel')"
          (click)="openCreateChannel(); $event.stopPropagation()"
        >
          <span class="material-icons" aria-hidden="true">add</span>
        </button>
      }

      <app-rail-select-list
        [compact]="true"
        [items]="channelListItems()"
        [selectedId]="selectedChannelId()"
        [listAriaLabel]="t('colleagues.channels.title', 'Channels')"
        [emptyMessage]="t('colleagues.channels.empty', 'No channels')"
        (itemSelected)="channelSelected.emit($event)"
        (actionTriggered)="onChannelAction($event)"
      />
    </app-rail-section>

    <app-rail-section
      icon="chat_bubble_outline"
      [label]="t('colleagues.direct_messages.title', 'Direct messages')"
      [expanded]="dmExpanded()"
      (expandedChange)="dmExpanded.set($event)"
      [fillHeight]="true"
    >
      @for (group of dmTimeGroups(); track group.key) {
        <app-rail-group-heading [label]="group.label" />
        <app-rail-select-list
          [compact]="true"
          [items]="group.items"
          [selectedId]="activeDmMemberId()"
          [loading]="loading()"
          [listAriaLabel]="group.label"
          [loadingMessage]="t('colleagues.direct_messages.loading', 'Loading direct messages')"
          [emptyMessage]="t('colleagues.direct_messages.empty', 'No direct messages')"
          (itemSelected)="onMemberSelected($event)"
        />
      }

      @if (!loading() && dmTimeGroups().length === 0) {
        <app-rail-status [message]="t('colleagues.direct_messages.empty', 'No direct messages')" />
      }
    </app-rail-section>
  </div>
</app-page-rail>
