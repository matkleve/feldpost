<nav class="member-list" aria-label="{{ t('colleagues.sidebar.label', 'Colleagues') }}">
  <div class="member-list__tabs">
    <button type="button" [class.active]="activeTab() === 'members'" (click)="tabChange.emit('members')">
      {{ t('colleagues.tab.members', 'Members') }}
    </button>
    <button type="button" [class.active]="activeTab() === 'invites'" (click)="tabChange.emit('invites')">
      {{ t('colleagues.tab.invites', 'Invites') }}
    </button>
  </div>

  <section class="member-list__channels">
    <h2>{{ t('colleagues.channels.title', 'Channels') }}</h2>
    <ul>
      @for (channel of channels(); track channel.id) {
        <li>
          <button
            type="button"
            class="member-list__channel"
            [class.member-list__channel--active]="selectedChannelId() === channel.id"
            (click)="channelSelected.emit(channel.id)"
          >
            # {{ channelLabel(channel) }}
          </button>
        </li>
      }
    </ul>
  </section>

  <section class="member-list__members">
    <h2>{{ t('colleagues.members.title', 'Colleagues') }}</h2>
    <input
      type="search"
      class="member-list__search"
      [placeholder]="t('colleagues.members.search', 'Search colleagues')"
      [ngModel]="searchQuery()"
      (ngModelChange)="searchQuery.set($event)"
    />
    <ul role="listbox">
      @for (member of filteredMembers(); track member.id) {
        <li>
          <button
            type="button"
            role="option"
            class="member-list__row"
            [class.member-list__row--active]="selectedMemberId() === member.id"
            [attr.aria-selected]="selectedMemberId() === member.id"
            [disabled]="loading()"
            (click)="memberSelected.emit(member.id)"
          >
            <span class="member-list__avatar" [class.member-list__avatar--online]="member.isOnline">
              {{ member.fullName.charAt(0).toUpperCase() || '?' }}
            </span>
            <span class="member-list__meta">
              <span class="member-list__name">{{ member.fullName || t('colleagues.members.unnamed', 'Unnamed') }}</span>
              <span class="member-list__role" [style.color]="member.roleColor ?? 'inherit'">{{ member.roleDisplayName }}</span>
            </span>
          </button>
        </li>
      }
    </ul>
  </section>
</nav>
