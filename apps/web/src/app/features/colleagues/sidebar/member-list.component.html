<nav class="member-list" aria-label="{{ t('colleagues.sidebar.label', 'Team') }}">
  <app-page-rail-title [title]="t('colleagues.page.title', 'Team')" />

  <div class="member-list__tabs" hlmPillToggle size="sm" fill>
    <div
      hlmToggleGroup
      size="sm"
      class="member-list__tab-group w-full"
      brnToggleGroup
      type="single"
      [nullable]="false"
      [value]="activeTab()"
      (valueChange)="onTabToggle($event)"
      [attr.aria-label]="t('colleagues.tabs.aria', 'Team sections')"
    >
      <button
        type="button"
        hlmToggleGroupItem
        size="sm"
        brnToggleGroupItem
        value="members"
        [attr.aria-label]="t('colleagues.tab.members', 'Members')"
        [attr.title]="t('colleagues.tab.members', 'Members')"
      >
        <span class="material-icons" aria-hidden="true">groups</span>
        <span>{{ t('colleagues.tab.members', 'Members') }}</span>
      </button>
      <button
        type="button"
        hlmToggleGroupItem
        size="sm"
        brnToggleGroupItem
        value="invites"
        [attr.aria-label]="t('colleagues.tab.invites', 'Invites')"
        [attr.title]="t('colleagues.tab.invites', 'Invites')"
      >
        <span class="material-icons" aria-hidden="true">mail</span>
        <span>{{ t('colleagues.tab.invites', 'Invites') }}</span>
      </button>
    </div>
  </div>

  <section class="member-list__channels">
    <div class="member-list__section-header">
      <h2>{{ t('colleagues.channels.title', 'Channels') }}</h2>
      @if (canManageChannels()) {
        <button
          type="button"
          hlmBtn
          variant="ghost"
          size="icon"
          [attr.aria-label]="t('colleagues.channel.create', 'Create channel')"
          (click)="openCreateChannelDialog()"
        >
          <span class="material-icons" aria-hidden="true">add</span>
        </button>
      }
    </div>
    <app-rail-select-list
      [compact]="true"
      [items]="channelListItems()"
      [selectedId]="selectedChannelId()"
      [listAriaLabel]="t('colleagues.channels.title', 'Channels')"
      [emptyMessage]="t('colleagues.channels.empty', 'No channels')"
      (itemSelected)="channelSelected.emit($event)"
      (actionTriggered)="onChannelAction($event)"
    />
  </section>

  <section class="member-list__members">
    <h2>{{ t('colleagues.members.title', 'Colleagues') }}</h2>
    <app-rail-search-field
      [value]="searchQuery()"
      [placeholder]="t('colleagues.members.search', 'Search colleagues')"
      [ariaLabel]="t('colleagues.members.search_aria', 'Search colleagues')"
      (valueChange)="searchQuery.set($event)"
    />
    <app-rail-select-list
      [items]="memberListItems()"
      [selectedId]="selectedMemberId()"
      [loading]="loading()"
      [listAriaLabel]="t('colleagues.members.title', 'Colleagues')"
      [loadingMessage]="t('colleagues.members.loading', 'Loading colleagues')"
      [emptyMessage]="t('colleagues.members.empty', 'No colleagues found')"
      (itemSelected)="memberSelected.emit($event)"
      (actionTriggered)="onMemberAction($event)"
    />
  </section>

  <app-channel-create-dialog
    (confirmed)="onChannelCreateConfirmed($event)"
  />
</nav>
