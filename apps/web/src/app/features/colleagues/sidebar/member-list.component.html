<nav class="member-list" aria-label="{{ t('colleagues.sidebar.label', 'Team') }}">
  <app-page-rail-title [title]="t('colleagues.page.title', 'Team')" />

  <div class="member-list__tabs">
    <button type="button" [class.active]="activeTab() === 'members'" (click)="tabChange.emit('members')">
      {{ t('colleagues.tab.members', 'Members') }}
    </button>
    <button type="button" [class.active]="activeTab() === 'invites'" (click)="tabChange.emit('invites')">
      {{ t('colleagues.tab.invites', 'Invites') }}
    </button>
  </div>

  <section class="member-list__channels">
    <h2>{{ t('colleagues.channels.title', 'Channels') }}</h2>
    <app-rail-select-list
      [compact]="true"
      [items]="channelListItems()"
      [selectedId]="selectedChannelId()"
      [listAriaLabel]="t('colleagues.channels.title', 'Channels')"
      [emptyMessage]="t('colleagues.channels.empty', 'No channels')"
      (itemSelected)="channelSelected.emit($event)"
    />
  </section>

  <section class="member-list__members">
    <h2>{{ t('colleagues.members.title', 'Colleagues') }}</h2>
    <app-rail-search-field
      [value]="searchQuery()"
      [placeholder]="t('colleagues.members.search', 'Search colleagues')"
      [ariaLabel]="t('colleagues.members.search_aria', 'Search colleagues')"
      (valueChange)="searchQuery.set($event)"
    />
    <app-rail-select-list
      [items]="memberListItems()"
      [selectedId]="selectedMemberId()"
      [loading]="loading()"
      [listAriaLabel]="t('colleagues.members.title', 'Colleagues')"
      [loadingMessage]="t('colleagues.members.loading', 'Loading colleagues')"
      [emptyMessage]="t('colleagues.members.empty', 'No colleagues found')"
      (itemSelected)="memberSelected.emit($event)"
      (actionTriggered)="onMemberAction($event)"
    />
  </section>
</nav>
