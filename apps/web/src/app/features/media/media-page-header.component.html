<!-- Renders page-header container for media route title and count summary. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#wiring -->
<!-- Renders main page heading for the /media route. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#wiring -->
<h1 class="media-page-header__title">{{ title() }}</h1>
<!-- Renders loading/count summary text including loaded-of-total fallback logic. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#data -->
<p class="media-page-header__count">
  @if (state() === 'loading') {
    {{ t('common.loading', 'Loading media...') }}
  } @else if (showLoadedOfTotal()) {
    {{ loadedOfTotalLabel() }}
  } @else {
    {{ mediaCount() }}
    {{
      mediaCount() === 1
        ? t('media.page.header.item', 'item')
        : t('media.page.header.items', 'items')
    }}
  }
</p>
