<!-- Renders the /media page content stack in a flat host-owned layout. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#data -->
<!-- Stacks header, toolbar, content, and progressive-loading footer with token spacing. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#actions -->
<app-vstack class="content-clamp content-clamp--list" [spacing]="4">
  <!-- Page Header with Breadcrumb -->
  <!-- Renders media title, breadcrumb, and loaded-count summary. -->
  <!-- @see docs/specs/component/item-grid/item-grid.md#data -->
  <app-media-page-header
    [title]="t('media.page.title', 'Media')"
    [mediaCount]="mediaItems().length"
    [totalCount]="mediaTotalCount()"
    [state]="headerState()"
  />

  <!-- Hosts right-aligned card-variant switch used to drive item-grid mode mapping. -->
  <!-- @see docs/specs/component/item-grid/item-grid.md#actions -->
  <app-pane-toolbar class="media-toolbar">
    <!-- Renders card-variant segmented control and emits selected variant changes. -->
    <!-- @see docs/specs/component/item-grid/item-grid.md#actions -->
    <app-card-variant-switch
      slot="right"
      [value]="cardVariant()"
      [allowed]="allowedCardVariants"
      [ariaLabel]="t('workspace.toolbar.size.aria', 'Thumbnail size')"
      (valueChange)="cardVariant.set($event)"
    />
  </app-pane-toolbar>

  <!-- Renders media content state machine and forwards item/retry events to page controller. -->
  <!-- @see docs/specs/component/item-grid/item-grid.md#wiring -->
  <app-media-content
    [state]="contentState()"
    [items]="mediaItems()"
    [emptyReason]="emptyReason()"
    [cardVariant]="cardVariant()"
    [projectNameFor]="projectNameForFn"
    (itemClicked)="onMediaItemClicked($event)"
    (retry)="onRetryLoad()"
  />

  @if (loadingMore()) {
    <!-- Shows incremental pagination feedback while additional pages are appended. -->
    <!-- @see docs/specs/component/item-grid/item-grid.md#actions -->
    <p class="media-page__loading-more">
      {{ t('media.page.loading.more', 'Loading more media...') }}
    </p>
  }
</app-vstack>
