<!-- Applies shared item-state contract wrapper around the media-domain item surface. -->
<!-- @see docs/element-specs/item-grid.md#component-hierarchy -->
<app-item-state-frame
  [itemId]="itemId()"
  [mode]="activeMode()"
  [loading]="false"
  [error]="error()"
  [empty]="empty()"
  [selected]="selected()"
  [disabled]="disabled()"
  [loadingLabel]="loadingLabel()"
  [errorLabel]="errorLabel()"
  [emptyLabel]="emptyLabel()"
  [retryLabel]="t('media.page.retry', 'Retry')"
  (retryRequested)="onRetryRequested($event)"
>
  @if (item()) {
    <!-- Hosts media-item domain surface with mode modifiers and context-menu wiring. -->
    <!-- @see docs/element-specs/media-item.md#component-hierarchy -->
    <article
      class="media-item"
      [class.media-item--selected]="selected()"
      [class.media-item--row]="activeMode() === 'row'"
      [class.media-item--grid-sm]="activeMode() === 'grid-sm'"
      [class.media-item--grid-md]="activeMode() === 'grid-md'"
      [class.media-item--grid-lg]="activeMode() === 'grid-lg'"
      [class.media-item--card]="activeMode() === 'card'"
      (contextmenu)="onContextMenu($event)"
    >
      <!-- Renders square media slot with canonical state layers and lower-right file-type chip. -->
      <!-- @see docs/element-specs/media-item.md#actions--interactions -->
      <app-media-item-render-surface
        class="media-item__preview"
        [slotMode]="activeMode()"
        [renderState]="mediaRenderState()"
        [isImage]="canRenderImage()"
        [isDocument]="fileType().category === 'document'"
        [selected]="selected()"
        [thumbnailUrl]="thumbnailUrl()"
        [icon]="mediaIcon()"
        [altText]="titleText()"
        [requestedTier]="requestedTier()"
        [effectiveTier]="effectiveTier()"
        [slotWidthRem]="slotWidthRem()"
        [slotHeightRem]="slotHeightRem()"
        [fileTypeIcon]="mediaIcon()"
        [fileTypeText]="mediaTypeLabel()"
        [fileTypeChipVariant]="fileTypeChipVariant()"
      />

      <!-- Renders upload overlay as host-aligned absolute layer below selected and quiet-action layers. -->
      <!-- @see docs/element-specs/media-item.md#visual-behavior-contract -->
      @if (uploadOverlay(); as overlay) {
        <app-media-item-upload-overlay class="media-item__upload-overlay" [overlay]="overlay" />
      }

      <!-- Renders quiet actions as the top-most overlay layer for hover/focus interactions. -->
      <!-- @see docs/element-specs/media-item.md#visual-behavior-contract -->
      <app-media-item-quiet-actions
        class="media-item__quiet-actions"
        [selected]="selected()"
        [disabled]="disabled()"
        [mapDisabled]="!hasMapLocation()"
        [selectLabel]="t('workspace.thumbnailCard.action.toggleSelection', 'Toggle selection')"
        [mapLabel]="t('workspace.thumbnailCard.action.jumpToLocation', 'Jump to location')"
        (selectRequested)="onSelectRequested()"
        (mapRequested)="onMapActionRequested()"
      />

      <!-- Defines primary open action region as a sibling overlay so quiet-action buttons stay valid. -->
      <!-- @see docs/element-specs/media-item.md#actions--interactions -->
      <button
        type="button"
        class="media-item__open"
        [attr.aria-label]="
          t('workspace.thumbnailCard.action.viewImagePrefix', 'View image') + ' ' + titleText()
        "
        (click)="onOpenClick($event)"
      ></button>
    </article>
  }
</app-item-state-frame>
