<!-- Renders media error-state card when media loading request fails. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#state -->
<!-- Displays localized error headline for failed media load branch. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#state -->
<h2 class="media-error__title">{{ t('media.page.error', 'Failed to load media') }}</h2>
<!-- Displays localized helper text instructing user to retry later. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#state -->
<p class="media-error__body">
  {{ t('projects.page.error.body', 'Please try again in a moment.') }}
</p>
<!-- Emits retry event so parent can restart media page loading. -->
<!-- @see docs/specs/component/item-grid/item-grid.md#actions -->
<button
  uiButton
  uiButtonSecondary
  type="button"
  class="ui-button ui-button--secondary media-error__retry"
  (click)="retry.emit()"
>
  {{ t('media.page.retry', 'Retry') }}
</button>
