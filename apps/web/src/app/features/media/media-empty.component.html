<!-- Renders media empty-state card with reason-dependent title, body, and primary action. -->
<!-- @see docs/specs/component/item-grid.md#state -->
<!-- Displays localized empty-state headline for auth-required or no-results branch. -->
<!-- @see docs/specs/component/item-grid.md#state -->
<h2 class="media-empty__title">{{ titleText() }}</h2>
<!-- Displays localized empty-state explanatory body text. -->
<!-- @see docs/specs/component/item-grid.md#state -->
<p class="media-empty__body">{{ bodyText() }}</p>
<!-- Triggers sign-in navigation or retry event depending on resolved empty-state reason. -->
<!-- @see docs/specs/component/item-grid.md#actions -->
<button
  uiButton
  uiButtonSecondary
  type="button"
  class="ui-button ui-button--secondary media-empty__retry"
  (click)="onPrimaryAction()"
>
  {{ actionLabel() }}
</button>
