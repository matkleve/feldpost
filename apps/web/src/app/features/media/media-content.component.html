<section class="media-content">
  @if (loading()) {
    <app-item-grid [mode]="itemMode()">
      @for (placeholderId of loadingPlaceholderIds(); track placeholderId) {
        <app-item-state-frame
          [itemId]="'media-loading-' + placeholderId"
          [mode]="itemMode()"
          [disabled]="true"
        >
          <app-media-item-render-surface [renderState]="'loading'" />
        </app-item-state-frame>
      }
    </app-item-grid>
  } @else if (error()) {
    <app-media-error (retry)="retry.emit()" />
  } @else if (items().length === 0) {
    <app-media-empty [reason]="emptyReason()" (retry)="retry.emit()" />
  } @else {
    <app-item-grid [mode]="itemMode()" [role]="'listbox'">
      @for (item of items(); track item.id) {
        <app-media-item
          [itemId]="item.id"
          [item]="item"
          [mode]="itemMode()"
          [selected]="isSelected(item.id)"
          [actionContextId]="mediaItemActionContext"
          (opened)="itemClicked.emit($event)"
          (selectedChange)="onSelectionToggled(item.id)"
        />
      }
    </app-item-grid>
  }
</section>
