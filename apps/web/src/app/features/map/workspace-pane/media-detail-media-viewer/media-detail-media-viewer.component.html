<input
  #fileInput
  type="file"
  [accept]="acceptTypes()"
  class="visually-hidden"
  aria-hidden="true"
  (change)="onFileSelected($event)"
/>

@if (hasPhoto()) {
  <div class="detail-image-container">
    <button
      class="detail-image-wrap"
      type="button"
      [disabled]="!canOpenLightbox()"
      [class.detail-image-wrap--static]="!canOpenLightbox()"
      [class.detail-image-wrap--thumb-preview]="usesThumbnailPreview()"
      [attr.aria-label]="
        t('workspace.imageDetail.action.viewFullSizeMedia.aria', 'View full-size media')
      "
      (click)="openLightbox()"
      (contextmenu)="requestContextMenu($event)"
    >
      <app-universal-media
        class="detail-image-media"
        [context]="'detail'"
        [requestedTier]="'full'"
        [renderState]="currentViewerState()"
        [altText]="viewerAltText()"
        [fit]="'contain'"
        [minHeightRem]="8"
      />
    </button>

    <button
      uiIconButtonGhost
      class="detail-image-edit-btn"
      type="button"
      [attr.aria-label]="t('workspace.imageDetail.action.replaceMedia.aria', 'Replace media')"
      [attr.title]="t('workspace.imageDetail.action.replaceMedia.title', 'Replace media')"
      [disabled]="replacing()"
      (click)="triggerFileInput()"
    >
      @if (replacing()) {
        <span class="detail-image-edit-btn__spinner" aria-hidden="true"></span>
      } @else {
        <span class="material-icons" aria-hidden="true">edit</span>
      }
    </button>

    @if (replaceError()) {
      <div class="detail-replace-error" role="alert">{{ replaceError() }}</div>
    }
  </div>
} @else {
  <div class="detail-upload-prompt">
    <div class="detail-upload-prompt__placeholder">
      <span class="detail-upload-prompt__icon" aria-hidden="true"></span>
      <span class="detail-upload-prompt__text">{{
        t('workspace.imageDetail.noMediaAttached', 'No media attached')
      }}</span>
    </div>
    <button
      uiButton
      uiButtonPrimary
      class="detail-upload-prompt__button"
      type="button"
      [disabled]="replacing()"
      (click)="triggerFileInput()"
    >
      @if (replacing()) {
        <span class="detail-upload-prompt__spinner" aria-hidden="true"></span>
      }
      {{ t('workspace.imageDetail.action.uploadMedia', 'Upload media') }}
    </button>
    @if (replaceError()) {
      <div class="detail-replace-error" role="alert">{{ replaceError() }}</div>
    }
  </div>
}

@if (showLightbox() && canOpenLightbox() && (fullResUrl() || thumbnailUrl())) {
  <app-photo-lightbox
    [imageUrl]="(fullResUrl() ?? thumbnailUrl())!"
    [alt]="displayTitle()"
    (closed)="showLightbox.set(false)"
  />
}
