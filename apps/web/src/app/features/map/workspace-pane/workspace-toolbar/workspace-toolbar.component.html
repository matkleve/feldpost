<div
  class="workspace-toolbar"
  role="toolbar"
  [attr.aria-label]="t('workspace.toolbar.aria.controls', 'Workspace controls')"
>
  @for (btn of buttons(); track btn.id) {
    <button
      uiDropdownTrigger
      [class.ui-button--active]="btn.active()"
      [open]="activeDropdown() === btn.id"
      [attr.aria-expanded]="activeDropdown() === btn.id"
      [attr.aria-haspopup]="true"
      (click)="toggleDropdown(btn.id, $event); $event.stopPropagation()"
    >
      <span class="ui-dropdown-trigger__label">{{ btn.label }}</span>
      <span class="ui-dropdown-trigger__chevron material-icons" aria-hidden="true">expand_more</span>
    </button>
  }

  <span class="workspace-toolbar__spacer" aria-hidden="true"></span>

  <div class="workspace-toolbar__size-control">
    <div class="ui-segmented" role="radiogroup" [attr.aria-label]="t('workspace.toolbar.size.aria', 'Thumbnail size')">
      @for (option of thumbnailSizeOptions(); track option.value) {
        <button type="button" class="ui-segmented__button ui-segmented__button--sm"
                [attr.aria-checked]="thumbnailSizePreset() === option.value"
                [class.ui-segmented__button--active]="thumbnailSizePreset() === option.value"
                (click)="onThumbnailSizeChanged(option.value)"
                [title]="option.label">
          <span class="material-icons" aria-hidden="true">{{ option.icon }}</span>
        </button>
      }
    </div>
  </div>
</div>

@if (activeDropdown()) {
  <app-dropdown-shell
    panelClass="toolbar-dropdown option-menu-surface"
    [top]="dropdownTop()"
    [left]="dropdownLeft()"
    [outsideCloseEnabled]="!isDragging()"
    (closeRequested)="closeDropdown()"
  >
    @switch (activeDropdown()) {
      @case ('grouping') {
        <app-grouping-dropdown
          [activeGroupings]="activeGroupings()"
          [availableProperties]="availableGroupings()"
          (groupingsChanged)="onGroupingsChanged($event.active, $event.available)"
          (dragStarted)="onDragStarted()"
          (dragEnded)="onDragEnded()"
        />
      }
      @case ('filter') {
        <app-filter-dropdown />
      }
      @case ('sort') {
        <app-sort-dropdown (sortChanged)="onSortChanged($event)" />
      }
      @case ('projects') {
        <app-projects-dropdown (projectsChanged)="onProjectsChanged($event)" />
      }
    }
  </app-dropdown-shell>
}
