<!-- Workspace Pane — right panel (desktop), bottom sheet (mobile, future) -->
<div class="workspace-pane ui-container" role="region" aria-label="Workspace pane">
  <app-pane-header
    [title]="title()"
    [editable]="titleEditable()"
    [editValue]="titleEditValue()"
    (editValueChange)="onTitleEditValueChange($event)"
    (editSubmitted)="onTitleSubmit($event)"
    (close)="close()"
  ></app-pane-header>

  @if (detailImageId()) {
    <app-image-detail-view
      [imageId]="detailImageId()"
      (closed)="onDetailClose()"
      (zoomToLocationRequested)="onZoomToLocation($event)"
    />
  } @else {
    <app-workspace-toolbar />
    <app-thumbnail-grid (thumbnailClicked)="onThumbnailClick($event)" />
  }
</div>
