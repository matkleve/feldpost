<section
  class="workspace-export"
  [attr.aria-label]="t('workspace.export.aria.actions', 'Workspace export actions')"
>
  <div class="workspace-export__summary">
    <strong>{{ selectionService.selectedCount() }}</strong>
    <span>{{ t('workspace.export.summary.selected', 'selected') }}</span>
  </div>

  <div class="workspace-export__actions">
    <button uiButton type="button" class="workspace-export__btn" (click)="selectAll()">
      <span class="material-icons workspace-export__btn-icon" aria-hidden="true">done_all</span>
      <span>{{ t('workspace.export.action.selectAll', 'Select all') }}</span>
    </button>
    <button uiButton type="button" class="workspace-export__btn" (click)="selectNone()">
      <span class="material-icons workspace-export__btn-icon" aria-hidden="true">deselect</span>
      <span>{{ t('workspace.export.action.selectNone', 'Select none') }}</span>
    </button>
    <button
      uiButton
      type="button"
      class="workspace-export__btn"
      [disabled]="pending()"
      (click)="shareLink()"
    >
      <span class="material-icons workspace-export__btn-icon" aria-hidden="true">share</span>
      <span>{{ t('workspace.export.action.share', 'Share') }}</span>
    </button>
    <button
      uiButton
      type="button"
      class="workspace-export__btn"
      [disabled]="pending()"
      (click)="copyLink()"
    >
      <span class="material-icons workspace-export__btn-icon" aria-hidden="true">content_copy</span>
      <span>{{ t('workspace.export.action.copyLink', 'Link kopieren') }}</span>
    </button>
    <button
      uiButton
      uiButtonPrimary
      type="button"
      class="workspace-export__btn workspace-export__btn--primary"
      [disabled]="pending()"
      (click)="openZipDialog()"
    >
      <span class="material-icons workspace-export__btn-icon" aria-hidden="true">download</span>
      <span>{{ t('workspace.export.action.downloadZip', 'Download ZIP') }}</span>
    </button>
  </div>
</section>

@if (zipDialogOpen()) {
  <div class="workspace-export__dialog-backdrop" (click)="closeZipDialog()"></div>
  <section
    class="workspace-export__dialog"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="t('workspace.export.dialog.aria', 'Download ZIP')"
  >
    <h3>{{ t('workspace.export.dialog.title', 'Download selection') }}</h3>
    <label for="zip-title">{{ t('workspace.export.dialog.field.title', 'Title') }}</label>
    <input
      uiInputControl
      id="zip-title"
      class="ui-input-control"
      type="text"
      [value]="zipTitle()"
      (input)="zipTitle.set($any($event.target).value)"
      [disabled]="pending()"
    />

    <div class="workspace-export__progress" [style.--progress]="zipProgress() * 100 + '%'">
      <span>{{ (zipProgress() * 100).toFixed(0) }}%</span>
    </div>

    <div class="workspace-export__dialog-actions">
      <button
        uiButton
        type="button"
        class="workspace-export__btn"
        [disabled]="pending()"
        (click)="closeZipDialog()"
      >
        {{ t('workspace.export.dialog.cancel', 'Cancel') }}
      </button>
      <button
        uiButton
        uiButtonPrimary
        type="button"
        class="workspace-export__btn workspace-export__btn--primary"
        [disabled]="pending()"
        (click)="downloadZip()"
      >
        {{
          pending()
            ? t('workspace.export.dialog.pending', 'Preparing...')
            : t('workspace.export.dialog.confirm', 'Download')
        }}
      </button>
    </div>
  </section>
}
