<div class="dd-section-label">{{ t('workspace.detailActions.section.title', 'Actions') }}</div>

<button
  class="dd-item"
  type="button"
  [disabled]="!hasCoordinates()"
  (click)="zoomToLocation.emit()"
>
  <span class="material-icons dd-item__icon" aria-hidden="true">gps_fixed</span>
  <span class="dd-item__label">{{
    t('workspace.detailActions.action.zoomToLocation', 'Zoom to location')
  }}</span>
</button>

<button class="dd-item" type="button" (click)="addToProject.emit()">
  <span class="material-icons dd-item__icon" aria-hidden="true">folder_open</span>
  <span class="dd-item__label">{{ t('workspace.detailActions.action.addToProject', 'Add to project') }}</span>
</button>

<button class="dd-item" type="button" (click)="copyCoordinates.emit()">
  <span class="material-icons dd-item__icon" aria-hidden="true">content_copy</span>
  <span class="dd-item__label">{{
    t('workspace.detailActions.action.copyCoordinates', 'Copy coordinates')
  }}</span>
</button>

<div class="dd-divider"></div>

<button class="dd-item dd-item--danger" type="button" (click)="deleteImage.emit()">
  <span class="material-icons dd-item__icon" aria-hidden="true">delete</span>
  <span class="dd-item__label">{{ t('workspace.detailActions.action.deleteImage', 'Delete image') }}</span>
</button>
