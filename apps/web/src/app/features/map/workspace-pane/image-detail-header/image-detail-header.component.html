<div class="detail-header">
  <button
    class="detail-back-btn icon-btn-ghost"
    type="button"
    [attr.aria-label]="t('workspace.imageDetail.action.back.aria', 'Back to gallery')"
    [attr.title]="t('workspace.imageDetail.action.back.title', 'Back to gallery')"
    (click)="closed.emit()"
  >
    <span class="material-icons" aria-hidden="true">arrow_back</span>
  </button>

  @if (editingTitle()) {
    <input
      #titleInput
      class="detail-title-input"
      type="text"
      [value]="titleValue()"
      [attr.aria-label]="t('workspace.imageDetail.title.edit.aria', 'Edit image title')"
      (keydown.enter)="titleSaveRequested.emit(titleInput.value)"
      (keydown.escape)="titleEditCancelled.emit()"
      (blur)="titleSaveRequested.emit(titleInput.value)"
    />
  } @else {
    <button
      class="detail-title detail-title--editable"
      type="button"
      [attr.title]="t('workspace.imageDetail.title.edit.title', 'Click to edit title')"
      (click)="titleEditRequested.emit()"
    >
      {{ displayTitle() }}
    </button>
  }

  <span
    class="detail-kind-chip"
    [attr.aria-label]="t('workspace.imageDetail.fileType.aria', 'File type')"
    >{{ mediaTypeLabel() }}</span
  >

  <button
    #contextMenuTrigger
    class="detail-actions-btn icon-btn-ghost"
    type="button"
    [attr.aria-label]="t('workspace.imageDetail.action.more.aria', 'More actions')"
    [attr.title]="t('workspace.imageDetail.action.more.title', 'More actions')"
    aria-haspopup="true"
    [attr.aria-expanded]="showContextMenu()"
    (click)="onContextMenuToggleRequested()"
  >
    <span class="material-icons" aria-hidden="true">more_vert</span>
  </button>

  @if (showContextMenu()) {
    <app-dropdown-shell
      #contextMenuPanel
      class="detail-context-menu"
      [top]="contextMenuTop()"
      [left]="contextMenuLeft()"
      [minWidth]="176"
      panelClass="detail-context-menu option-menu-surface"
      (closeRequested)="onContextMenuCloseRequested()"
    >
      <div class="dd-items" role="menu" (keydown)="onContextMenuKeydown($event)">
        <button
          class="dd-item dd-item--danger"
          type="button"
          role="menuitem"
          (click)="deleteRequested.emit()"
        >
          <span class="material-icons dd-item__icon" aria-hidden="true">delete</span>
          <span class="dd-item__label">{{
            t('workspace.imageDetail.action.delete', 'Delete image')
          }}</span>
        </button>
        <button
          class="dd-item"
          type="button"
          role="menuitem"
          (click)="copyCoordinatesRequested.emit()"
        >
          <span class="material-icons dd-item__icon" aria-hidden="true">content_copy</span>
          <span class="dd-item__label">{{
            t('workspace.imageDetail.action.copyCoordinates', 'Copy coordinates')
          }}</span>
        </button>
      </div>
    </app-dropdown-shell>
  }
</div>
