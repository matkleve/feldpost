<div class="timespace-dropdown" role="group" [attr.aria-label]="t('map.filter.timespace.aria', 'Time range')">
  <label class="timespace-dropdown__date">
    <span class="timespace-dropdown__sr-only">{{ t('map.filter.timespace.from', 'From') }}</span>
    <input
      hlmInput
      class="timespace-dropdown__date-input"
      type="date"
      [value]="fromInput()"
      (change)="onFromInput($event)"
    />
  </label>

  <div
    #chart
    class="timespace-dropdown__chart"
    role="slider"
    [attr.aria-label]="t('map.filter.timespace.chartAria', 'Media timeline')"
    [attr.aria-valuemin]="0"
    [attr.aria-valuemax]="100"
    tabindex="0"
    (pointerdown)="onChartPointerDown($event)"
    (pointermove)="onChartPointerMove($event)"
    (pointerup)="onChartPointerUp($event)"
    (pointercancel)="onChartPointerCancel()"
  >
    @if (histogram(); as hist) {
      <div class="timespace-dropdown__bars" aria-hidden="true">
        @for (bin of hist.bins; track bin.index) {
          <span
            class="timespace-dropdown__bar"
            [style.height.%]="bin.heightPct"
          ></span>
        }
      </div>
      @if (selectionOverlay(); as overlay) {
        <div
          class="timespace-dropdown__selection"
          [class.timespace-dropdown__selection--active]="selectionIsActive()"
          [style.left.%]="overlay.leftPct"
          [style.width.%]="overlay.widthPct"
          aria-hidden="true"
        ></div>
      }
    } @else {
      <p class="timespace-dropdown__empty">
        {{ t('map.filter.timespace.empty', 'No dated media yet.') }}
      </p>
    }
  </div>

  <label class="timespace-dropdown__date">
    <span class="timespace-dropdown__sr-only">{{ t('map.filter.timespace.to', 'To') }}</span>
    <input
      hlmInput
      class="timespace-dropdown__date-input"
      type="date"
      [value]="toInput()"
      (change)="onToInput($event)"
    />
  </label>
</div>
