<section class="org-section">
  <header class="org-section__header">
    <h1>{{ t('organization.branding.title', 'Branding') }}</h1>
    <p>{{ t('organization.branding.subtitle', 'Organization color overrides applied to the workspace theme.') }}</p>
  </header>
  <form class="org-section__form" (ngSubmit)="onSave()">
    <div hlmFormField>
      <label hlmLabel for="brand-primary">{{ t('organization.branding.primary', 'Primary color') }}</label>
      <input
        hlmInput
        id="brand-primary"
        type="color"
        [ngModel]="primaryColor() || feldpostDefaults.primaryColor"
        (ngModelChange)="primaryColor.set($event)"
        name="primary"
        [disabled]="!canEdit()"
      />
    </div>
    <div hlmFormField>
      <label hlmLabel for="brand-accent">{{ t('organization.branding.accent', 'Accent color') }}</label>
      <input
        hlmInput
        id="brand-accent"
        type="color"
        [ngModel]="accentColor() || feldpostDefaults.accentColor"
        (ngModelChange)="accentColor.set($event)"
        name="accent"
        [disabled]="!canEdit()"
      />
    </div>
    <div hlmFormField>
      <label hlmLabel for="brand-bg">{{ t('organization.branding.background', 'Background color') }}</label>
      <input
        hlmInput
        id="brand-bg"
        type="color"
        [ngModel]="backgroundColor() || feldpostDefaults.backgroundColor"
        (ngModelChange)="backgroundColor.set($event)"
        name="background"
        [disabled]="!canEdit()"
      />
    </div>
    @if (canEdit()) {
      <div class="org-section__actions">
        <button hlmBtn type="submit">{{ t('common.save', 'Save') }}</button>
        <button hlmBtn type="button" variant="outline" (click)="onReset()">
          {{ t('organization.branding.reset', 'Reset to Feldpost defaults') }}
        </button>
      </div>
    }
  </form>
</section>
