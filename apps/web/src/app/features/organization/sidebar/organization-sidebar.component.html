<app-page-rail [ariaLabel]="t('organization.sidebar.label', 'Organization sections')">
  <app-page-rail-title
    pageRailTitle
    icon="business"
    [title]="t('organization.page.title', 'Organization')"
  />

  <div pageRailBody class="organization-sidebar__section-list" role="list">
    @for (section of sections(); track section.id) {
      <app-rail-detail-nav-item
        [icon]="section.icon"
        [title]="t(section.labelKey, section.labelFallback)"
        [subtitle]="t(section.subtitleKey, section.subtitleFallback)"
        [active]="activeSection() === section.id"
        [disabled]="loading()"
        (clicked)="sectionSelected.emit(section.id)"
      />
    }
  </div>
</app-page-rail>
