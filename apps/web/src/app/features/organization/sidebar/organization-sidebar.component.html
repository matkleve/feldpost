<app-page-rail [ariaLabel]="t('organization.sidebar.label', 'Organization sections')">
  <app-page-rail-title
    pageRailTitle
    icon="business"
    [title]="t('organization.page.title', 'Organization')"
  />

  <app-rail-section
    pageRailBody
    icon="tune"
    [label]="t('organization.sidebar.label', 'Organization sections')"
    [expanded]="sectionsExpanded()"
    (expandedChange)="sectionsExpanded.set($event)"
    [fillHeight]="true"
  >
    <app-rail-select-list
      [items]="sectionItems()"
      [selectedId]="activeSection()"
      [listAriaLabel]="t('organization.sidebar.label', 'Organization sections')"
      (itemSelected)="onSectionSelected($event)"
    />
  </app-rail-section>
</app-page-rail>
