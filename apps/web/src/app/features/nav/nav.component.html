<nav
  class="sidebar"
  [class.sidebar--settings-open]="settingsOverlayOpen()"
  [attr.aria-label]="t('nav.aria.main', 'Main navigation')"
>
  <div class="sidebar__panel">

    <!-- Header -->
    <div class="nav__header">
      <svg class="nav__logo-mark" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="24" height="24" rx="6" class="nav__logo-bg"/>
        <rect x="8" y="7" width="2" height="10" class="nav__logo-fg"/>
        <rect x="8" y="7" width="9" height="2" class="nav__logo-fg"/>
        <rect x="8" y="12" width="7" height="2" class="nav__logo-fg"/>
      </svg>
      <span class="nav__header-title font-semibold">Feldpost</span>
      <button
        type="button"
        class="nav__collapse-btn"
        (click)="toggleCollapse()"
        [title]="sidebarCollapsed() ? t('nav.expand', 'Expand sidebar') : t('nav.collapse', 'Collapse sidebar')"
        [attr.aria-label]="sidebarCollapsed() ? t('nav.expand', 'Expand sidebar') : t('nav.collapse', 'Collapse sidebar')"
      >
        <span class="material-icons">view_sidebar</span>
      </button>
    </div>

    <!-- Nav items — flat list, no accordion -->
    <ul class="nav__list" role="list">
      @for (item of navItems(); track item.route) {
        <li class="sidebar__item">
          @if (item.disabled) {
            <span
              class="nav__link nav__link--disabled"
              role="link"
              aria-disabled="true"
              tabindex="-1"
              [title]="t('nav.disabled.titlePrefix', 'Coming soon: ') + item.label"
              [attr.aria-describedby]="'nav-disabled-tip'"
            >
              <span class="nav__media" aria-hidden="true">
                <span class="nav__icon material-icons">{{ item.icon }}</span>
              </span>
              <span class="nav__label text-sm">{{ item.label }}</span>
            </span>
          } @else {
            <a
              class="nav__link"
              [routerLink]="item.route"
              [class.nav__link--active]="isNavItemActive(item)"
              [attr.aria-current]="isNavItemActive(item) ? 'page' : null"
              [title]="item.label"
            >
              <span class="nav__media" aria-hidden="true">
                <span class="nav__icon material-icons">{{ item.icon }}</span>
              </span>
              <span class="nav__label text-sm">{{ item.label }}</span>
            </a>
          }
        </li>
      }
    </ul>

    <div class="sidebar__spacer" aria-hidden="true"></div>

    <!-- Utility row: theme cycle -->
    <div class="nav__utility-row">
      <button
        type="button"
        class="nav__utility-btn"
        (click)="toggleTheme()"
        [title]="themeLabel()"
        [attr.aria-label]="themeLabel()"
      >
        <span class="material-icons nav__utility-icon" aria-hidden="true">{{ themeIcon() }}</span>
        <span class="nav__label nav__utility-label text-sm">{{ themeLabel() }}</span>
      </button>
      <div class="nav__theme-dots" aria-hidden="true">
        <span class="nav__theme-dot" [class.nav__theme-dot--active]="themeService.mode() === 'light'"></span>
        <span class="nav__theme-dot" [class.nav__theme-dot--active]="themeService.mode() === 'dark'"></span>
        <span class="nav__theme-dot" [class.nav__theme-dot--active]="themeService.mode() === 'sandstone'"></span>
      </div>
    </div>

    <!-- Account / Settings -->
    <div class="sidebar__item sidebar__item--account">
      <button
        type="button"
        class="nav__link nav__account-link"
        [class.nav__link--active]="settingsOverlayOpen()"
        [title]="accountSidebarLabel()"
        [attr.aria-label]="t('nav.settings.openAria', 'Open settings overlay')"
        aria-haspopup="dialog"
        [attr.aria-expanded]="settingsOverlayOpen()"
        (click)="toggleSettingsOverlay()"
      >
        <span class="nav__media" aria-hidden="true">
          <span class="nav__avatar-badge text-sm font-semibold">
            @if (avatarUrl(); as avatarImage) {
              <img class="nav__avatar-image" [src]="avatarImage" alt="" />
            } @else {
              <span class="nav__avatar-initial">{{ avatarInitial() }}</span>
            }
          </span>
        </span>
        <span class="nav__label nav__account-name text-sm">{{ accountSidebarLabel() }}</span>
      </button>
    </div>

  </div>

  <span id="nav-disabled-tip" class="nav__sr-only">{{
    t('nav.disabled.srHint', 'This feature is coming soon.')
  }}</span>
</nav>
