<!--
  NavComponent — LeftSidebar: full-height sidebar (desktop) /
  fixed bottom tab bar (mobile < 768 px).
-->
<nav
  class="sidebar"
  [class.sidebar--settings-open]="settingsOverlayOpen()"
  [attr.aria-label]="t('nav.aria.main', 'Main navigation')"
>
  <div class="sidebar__panel">

    <!-- Header -->
    <div class="nav__header">
      <span class="nav__header-title text-sm font-semibold">Feldpost</span>
    </div>

    <!-- Search -->
    <div class="nav__search">
      <span class="nav__search-icon material-icons" aria-hidden="true">search</span>
      <input
        class="nav__search-input text-sm"
        type="search"
        [placeholder]="t('nav.search.placeholder', 'Suchen …')"
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        [attr.aria-label]="t('nav.search.aria', 'Navigation durchsuchen')"
      />
    </div>

    <!-- Expandable navigation section -->
    <button
      type="button"
      class="nav__section-toggle"
      [attr.aria-expanded]="navExpanded()"
      (click)="toggleNav()"
    >
      <span class="nav__section-label text-xs">{{ t('nav.section.navigation', 'Navigation') }}</span>
      <span class="nav__section-chevron material-icons" [class.nav__section-chevron--open]="navExpanded()" aria-hidden="true">expand_more</span>
    </button>

    @if (navExpanded()) {
      <ul class="nav__list" role="list">
        @for (item of navItems(); track item.route) {
          <li class="sidebar__item">
            @if (item.disabled) {
              <span
                class="nav__link nav__link--disabled"
                role="link"
                aria-disabled="true"
                tabindex="-1"
                [title]="t('nav.disabled.titlePrefix', 'Coming soon: ') + item.label"
                [attr.aria-describedby]="'nav-disabled-tip'"
              >
                <span class="nav__media" aria-hidden="true">
                  <span class="nav__icon material-icons">{{ item.icon }}</span>
                </span>
                <span class="nav__label text-sm">{{ item.label }}</span>
              </span>
            } @else {
              <a
                class="nav__link"
                [routerLink]="item.route"
                [class.nav__link--active]="isNavItemActive(item)"
                [attr.aria-current]="isNavItemActive(item) ? 'page' : null"
                [title]="item.label"
              >
                <span class="nav__media" aria-hidden="true">
                  <span class="nav__icon material-icons">{{ item.icon }}</span>
                </span>
                <span class="nav__label text-sm">{{ item.label }}</span>
              </a>
            }
          </li>
        }
      </ul>
    }

    <div class="sidebar__item sidebar__item--spacer" aria-hidden="true"></div>

    <div class="sidebar__item sidebar__item--account">
      <button
        type="button"
        class="nav__link nav__account-link"
        [class.nav__link--active]="settingsOverlayOpen()"
        [title]="accountSidebarLabel()"
        [attr.aria-label]="t('nav.settings.openAria', 'Open settings overlay')"
        aria-haspopup="dialog"
        [attr.aria-expanded]="settingsOverlayOpen()"
        (click)="toggleSettingsOverlay()"
      >
        <span class="nav__media" aria-hidden="true">
          <span class="nav__avatar-badge text-sm font-semibold">
            @if (avatarUrl(); as avatarImage) {
              <img class="nav__avatar-image" [src]="avatarImage" alt="" />
            } @else {
              <span class="nav__avatar-initial">{{ avatarInitial() }}</span>
            }
          </span>
        </span>
        <span class="nav__label nav__account-name text-sm">{{ accountSidebarLabel() }}</span>
      </button>
    </div>

  </div>

  <span id="nav-disabled-tip" class="nav__sr-only">{{
    t('nav.disabled.srHint', 'This feature is coming soon.')
  }}</span>
</nav>
