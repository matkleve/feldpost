<!--
  NavComponent — LeftSidebar: floating sidebar panel (desktop) /
  fixed bottom tab bar (mobile < 768 px).

  Desktop: vertically centred compact rail at rest (icon-only) →
           expands right on hover to show icon + label (150 ms ease-out).
  Mobile:  full-width bottom tab bar (unchanged behaviour).
-->
<nav
  class="sidebar"
  [class.sidebar--settings-open]="settingsOverlayOpen()"
  [attr.aria-label]="t('nav.aria.main', 'Main navigation')"
>
  <!-- Desktop sidebar panel -->
  <div class="sidebar__panel">
    <ul class="nav__list" role="list">
      @for (item of navItems(); track item.route) {
        <li class="sidebar__item">
          @if (item.disabled) {
            <span
              class="nav__link nav__link--disabled"
              role="link"
              aria-disabled="true"
              tabindex="-1"
              [title]="t('nav.disabled.titlePrefix', 'Coming soon: ') + item.label"
              [attr.aria-describedby]="'nav-disabled-tip'"
            >
              <span class="nav__media" aria-hidden="true">
                <span class="nav__icon material-icons">{{ item.icon }}</span>
              </span>
              <span class="nav__label text-sm">{{ item.label }}</span>
            </span>
          } @else {
            <a
              class="nav__link"
              [routerLink]="item.route"
              routerLinkActive="nav__link--active"
              [routerLinkActiveOptions]="item.route === '/' ? { exact: true } : { exact: false }"
              [attr.aria-current]="null"
              [title]="item.label"
            >
              <span class="nav__media" aria-hidden="true">
                <span class="nav__icon material-icons">{{ item.icon }}</span>
              </span>
              <span class="nav__label text-sm">{{ item.label }}</span>
            </a>
          }
        </li>
      }

      <li class="sidebar__item sidebar__item--spacer" aria-hidden="true"></li>

      <li class="sidebar__item sidebar__item--account">
        <button
          type="button"
          class="nav__link nav__account-link"
          [class.nav__link--active]="settingsOverlayOpen()"
          [title]="accountSidebarLabel()"
          [attr.aria-label]="t('nav.settings.openAria', 'Open settings overlay')"
          aria-haspopup="dialog"
          [attr.aria-expanded]="settingsOverlayOpen()"
          (click)="toggleSettingsOverlay()"
        >
          <span class="nav__media" aria-hidden="true">
            <span class="nav__avatar-badge text-sm font-semibold">
              @if (avatarUrl(); as avatarImage) {
                <img class="nav__avatar-image" [src]="avatarImage" alt="" />
              } @else {
                <span class="nav__avatar-initial">{{ avatarInitial() }}</span>
              }
            </span>
          </span>
          <span class="nav__label nav__account-name text-sm">{{ accountSidebarLabel() }}</span>
        </button>
      </li>
    </ul>
  </div>

  <span id="nav-disabled-tip" class="nav__sr-only">{{
    t('nav.disabled.srHint', 'This feature is coming soon.')
  }}</span>
</nav>
