<!--
  NavComponent — LeftSidebar: floating sidebar panel (desktop) /
  fixed bottom tab bar (mobile < 768 px).

  Desktop: vertically centred compact rail at rest (icon-only) →
           expands right on hover to show icon + label (150 ms ease-out).
  Mobile:  full-width bottom tab bar (unchanged behaviour).
-->
<nav class="sidebar" aria-label="Main navigation">
  <!-- Desktop sidebar panel -->
  <div class="sidebar__panel ui-container">
    <ul class="nav__list" role="list">
      @for (item of navItems; track item.route) {
        <li class="sidebar__item">
          @if (item.disabled) {
            <span
              class="nav__link nav__link--disabled"
              role="link"
              aria-disabled="true"
              tabindex="-1"
              [title]="'Coming soon: ' + item.label"
              [attr.aria-describedby]="'nav-disabled-tip'"
            >
              <span class="nav__icon material-icons" aria-hidden="true">{{ item.icon }}</span>
              <span class="nav__label">{{ item.label }}</span>
            </span>
          } @else {
            <a
              class="nav__link"
              [routerLink]="item.route"
              routerLinkActive="nav__link--active"
              [routerLinkActiveOptions]="item.route === '/' ? { exact: true } : { exact: false }"
              [attr.aria-current]="null"
              [title]="item.label"
            >
              <span class="nav__icon material-icons" aria-hidden="true">{{ item.icon }}</span>
              <span class="nav__label">{{ item.label }}</span>
            </a>
          }
        </li>
      }
    </ul>

    <!-- Spacer pushes avatar to bottom -->
    <div class="sidebar__spacer" aria-hidden="true"></div>

    <!-- Avatar slot -->
    <div class="sidebar__avatar-slot">
      <a
        class="nav__avatar"
        routerLink="/account"
        routerLinkActive="nav__avatar--active"
        title="Account"
        aria-label="Go to Account page"
      >
        {{ avatarInitial() }}
      </a>
    </div>
  </div>

  <span id="nav-disabled-tip" class="nav__sr-only">This feature is coming soon.</span>
</nav>
