<div
  class="media-card"
  [class.media-card--row]="variant() === 'row'"
  [class.media-card--small]="variant() === 'small'"
  [class.media-card--medium]="variant() === 'medium'"
  [class.media-card--large]="variant() === 'large'"
>
  <img [src]="item().thumbnail_path || ''" [alt]="item().address_label || 'Media item'" />
  <div class="media-card__info">
    <p class="media-card__title">{{ item().address_label }}</p>
    @if (variant() !== 'small') {
      <p class="media-card__date">{{ formatDate(item().captured_at) }}</p>
    }
    @if (variant() === 'large' && item().city) {
      <p class="media-card__context">{{ item().city }}</p>
    }
  </div>
</div>
