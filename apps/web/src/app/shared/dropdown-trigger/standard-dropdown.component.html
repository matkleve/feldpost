<div class="standard-dropdown flex min-h-0 flex-1 flex-col">
  @if (showSearch()) {
    <div
      class="standard-dropdown__search flex min-h-tap min-w-0 shrink-0 items-center gap-2 border-b border-border px-0 py-2"
    >
      <input
        class="min-w-0 flex-1 border-0 bg-transparent px-3 py-1 text-sm text-foreground outline-none placeholder:text-muted-foreground"
        type="text"
        [placeholder]="searchPlaceholder()"
        [value]="searchTerm()"
        (input)="searchTermChange.emit($any($event.target).value)"
      />

      @if (showDefaultClearAction() && searchTerm()) {
        <button
          hlmBtn
          variant="ghost"
          size="icon"
          class="shrink-0"
          type="button"
          [attr.aria-label]="clearSearchAriaLabel()"
          (click)="clearRequested.emit()"
        >
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
      }

      <ng-content select="[dropdown-search-action]" />
    </div>
  }

  <div [class]="itemsHostClass()">
    <ng-content select="[dropdown-items]" />
    @if (actionLabel()) {
      <button
        hlmMenuItem
        class="inline-flex w-full shrink-0 items-center justify-start gap-2 text-muted-foreground hover:text-foreground"
        type="button"
        (click)="actionRequested.emit()"
      >
        <span class="material-icons" aria-hidden="true">{{ actionIcon() }}</span>
        {{ actionLabel() }}
      </button>
    }
  </div>
</div>
