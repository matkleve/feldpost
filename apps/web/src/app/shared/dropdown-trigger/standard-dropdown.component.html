<div class="standard-dropdown">
  @if (showSearch()) {
    <div class="flex items-center border-b border-border py-1 pl-3 pr-1">
      <input
        class="min-w-0 flex-1 border-0 bg-transparent py-1 text-sm text-foreground outline-none placeholder:text-muted-foreground"
        type="text"
        [placeholder]="searchPlaceholder()"
        [value]="searchTerm()"
        (input)="searchTermChange.emit($any($event.target).value)"
      />

      @if (showDefaultClearAction() && searchTerm()) {
        <button
          hlmBtn
          variant="ghost"
          size="icon"
          class="shrink-0"
          type="button"
          [attr.aria-label]="clearSearchAriaLabel()"
          (click)="clearRequested.emit()"
        >
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
      }

      <ng-content select="[dropdown-search-action]" />
    </div>
  }

  <div [class]="itemsHostClass()">
    <ng-content select="[dropdown-items]" />
  </div>

  @if (actionLabel()) {
    <button
      hlmMenuItem
      class="inline-flex w-full items-center justify-start gap-2 text-muted-foreground hover:text-foreground"
      type="button"
      (click)="actionRequested.emit()"
    >
      <span class="material-icons" aria-hidden="true">{{ actionIcon() }}</span>
      {{ actionLabel() }}
    </button>
  }
</div>
