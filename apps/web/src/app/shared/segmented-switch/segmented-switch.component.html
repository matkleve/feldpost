<div
  class="segmented-switch"
  [class.segmented-switch--disabled]="disabled()"
  [class.segmented-switch--has-inactive]="inactiveOptions().length > 0"
  [class.segmented-switch--fill]="sizing() === 'fill'"
  [class.segmented-switch--sm]="size() === 'sm'"
  [class.segmented-switch--md]="size() === 'md'"
  [class.segmented-switch--lg]="size() === 'lg'"
>
  <div
    class="segmented-switch__group"
    role="group"
    [attr.aria-label]="ariaLabel()"
    (keydown)="onSegmentedKeydown($event)"
  >
    @for (option of segmentedOptions(); track option.id) {
      <button
        class="segmented-switch__button"
        type="button"
        [class.segmented-switch__button--active]="isSelected(option)"
        [class.segmented-switch__button--icon-only]="resolveType(option) === 'icon-only'"
        [class.segmented-switch__button--attention]="!!option.attention"
        [attr.aria-pressed]="isSelected(option)"
        [attr.aria-label]="option.ariaLabel || option.label"
        [attr.title]="option.title || option.label"
        [disabled]="disabled() || !!option.disabled"
        (click)="selectOption(option)"
      >
        @if (option.icon && resolveType(option) !== 'text-only') {
          <span class="material-icons segmented-switch__icon" aria-hidden="true">{{
            option.icon
          }}</span>
        }
        @if (resolveType(option) !== 'icon-only') {
          <span class="segmented-switch__label">{{ option.label }}</span>
        }
      </button>
    }
  </div>

  @if (inactiveOptions().length > 0) {
    <div class="segmented-switch__inactive-group" aria-hidden="true">
      @for (option of inactiveOptions(); track option.id) {
        <button
          class="segmented-switch__inactive-item"
          [class.segmented-switch__inactive-item--icon-only]="resolveType(option) === 'icon-only'"
          type="button"
          disabled
        >
          @if (option.icon && resolveType(option) !== 'text-only') {
            <span class="material-icons segmented-switch__icon" aria-hidden="true">{{
              option.icon
            }}</span>
          }
          @if (resolveType(option) !== 'icon-only') {
            <span class="segmented-switch__label">{{ option.label }}</span>
          }
        </button>
      }
    </div>
  }
</div>
