<button
  type="button"
  class="rail-detail-nav-item"
  [class.rail-detail-nav-item--active]="active()"
  [attr.aria-current]="active() ? 'true' : null"
  [disabled]="disabled()"
  (click)="clicked.emit()"
>
  <span class="rail-detail-nav-item__media" aria-hidden="true">
    <span class="material-icons">{{ icon() }}</span>
  </span>
  <span class="rail-detail-nav-item__label">
    <strong [attr.title]="title()">{{ title() }}</strong>
    @if (subtitle()) {
      <small [attr.title]="subtitle()">{{ subtitle() }}</small>
    }
  </span>
  <span class="material-icons rail-detail-nav-item__chevron" aria-hidden="true">chevron_right</span>
</button>
