<!-- Hosts absolute corner actions for media-item hover/focus affordances. -->
<!-- @see docs/specs/component/media/media-item.md#component-hierarchy -->
<!-- Stable states: interactive-unselected | interactive-selected | interactive-map-disabled | interactive-selected-map-disabled | disabled. -->
<!-- @see docs/specs/component/media/media-item-quiet-actions.md#state-machine -->
<!-- Renders top-left select toggle button for media item selection state. -->
<!-- @see docs/specs/component/media/media-item.md#actions--interactions -->
<button
  type="button"
  class="media-item-quiet-actions__button media-item-quiet-actions__button--select"
  hlmBtn
  [variant]="selected() ? 'default' : 'outline'"
  size="icon-sm"
  [disabled]="interactionsDisabled()"
  [attr.aria-pressed]="selected()"
  [attr.aria-label]="selectLabel()"
  (click)="onSelectClick($event)"
>
  @if (selected()) {
    <span class="material-icons media-item-quiet-actions__icon" aria-hidden="true">check</span>
  } @else {
    <span class="material-icons media-item-quiet-actions__icon" aria-hidden="true">radio_button_unchecked</span>
  }
</button>

<!-- Map zoom: only rendered when a zoomable location exists. -->
<!-- @see docs/specs/component/media/media-item-quiet-actions.md#state-machine -->
@if (!mapActionDisabled()) {
  <app-media-item-map-action
    [mediaItemId]="mediaItemId()"
    [legacyLatitude]="legacyLatitude()"
    [legacyLongitude]="legacyLongitude()"
    [legacyAddressLabel]="legacyAddressLabel()"
    [mapLabel]="mapLabel()"
    (mapZoomRequested)="mapZoomRequested.emit($event)"
  />
}
