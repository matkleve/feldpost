@if (item()) {
  <!-- Slot stack: media fill + interaction overlays share one parent-owned geometry box. -->
  <!-- @see docs/specs/component/media/media-item.md#spacing--framing-ownership -->
  <div
    class="media-item__slot"
    [style.--media-aspect-ratio]="mediaAspectRatio()"
    (transitionend)="onSlotGeometryTransitionEnd($event)"
  >
    <!-- Slot owns aspect-ratio transition; display fills slot and drives layer states. -->
    <!-- @see docs/specs/component/media/media-item.md#component-hierarchy -->
    <app-media-display
      #mediaPreview
      class="media-item__preview"
      [slotGeometry]="usesFillSlotGeometry() ? 'fill' : 'intrinsic'"
      [mediaId]="mediaIdentity()"
      [storagePath]="item()?.storage_path ?? null"
      [thumbnailPath]="item()?.thumbnail_path ?? null"
      [aspectRatio]="registryAspectRatioHint()"
      [contentObjectPosition]="slotContentObjectPosition()"
      (aspectRatioChange)="onMediaAspectRatioChange($event)"
    />

    @if (showFileTypeChip() && fileTypeChipText(); as chipText) {
      <app-chip
        class="media-item__filetype-chip"
        [icon]="fileTypeChipIcon()"
        [text]="chipText"
        [variant]="fileTypeChipVariant()"
      />
    }

    <!-- Renders selected emphasis border inside the slot, above media content. -->
    <!-- @see docs/specs/component/media/media-item.md#visual-behavior-contract -->
    <div
      class="media-item__frame"
      [class.media-item__frame--selected]="selected()"
      aria-hidden="true"
    ></div>

    <!-- Renders upload overlay as slot-aligned absolute layer below quiet actions. -->
    <!-- @see docs/specs/component/media/media-item.md#visual-behavior-contract -->
    @if (uploadOverlay(); as overlay) {
      <app-media-item-upload-overlay class="media-item__upload-overlay" [overlay]="overlay" />
    }

    <!-- Renders quiet actions as the top-most overlay layer for hover/focus interactions. -->
    <!-- @see docs/specs/component/media/media-item.md#visual-behavior-contract -->
    <app-media-item-quiet-actions
      class="media-item__quiet-actions"
      [state]="quietActionsState()"
      [selectLabel]="t('workspace.thumbnailCard.action.toggleSelection', 'Toggle selection')"
      [mapLabel]="t('workspace.thumbnailCard.action.jumpToLocation', 'Jump to location')"
      (selectRequested)="onSelectRequested()"
      (mapRequested)="onMapActionRequested()"
    />

    <!-- Defines primary open action region so quiet-action buttons remain reachable above it. -->
    <!-- @see docs/specs/component/media/media-item.md#actions--interactions -->
    <button
      type="button"
      class="media-item__open"
      [attr.aria-label]="
        t('workspace.thumbnailCard.action.viewImagePrefix', 'View image') + ' ' + titleText()
      "
      (click)="onOpenClick($event)"
    ></button>
  </div>
}
