@if (mode() === 'single') {
  <label class="calendar-dropdown">
    @if (label()) {
      <span class="calendar-dropdown__label">{{ label() }}</span>
    }
    <div
      #control
      class="calendar-dropdown__control"
      [attr.lang]="i18nService.locale()"
    >
      <input
        class="calendar-dropdown__input"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        [attr.placeholder]="placeholder()"
        [attr.aria-label]="ariaLabel() || label()"
        [value]="shellDisplayText()"
        (focus)="openIfClosed()"
        (change)="onShellTextCommit($event)"
        (keydown.enter)="onShellTextCommit($event)"
      />
      <button
        type="button"
        class="calendar-dropdown__trigger"
        [attr.aria-label]="t('shared.dateField.openCalendar', 'Open calendar')"
        [attr.aria-expanded]="popoverOpen()"
        (click)="togglePopover($event)"
      >
        <span class="material-icons" aria-hidden="true">calendar_today</span>
      </button>
    </div>
  </label>
} @else {
  @if (layout() === 'split') {
    <div
      class="calendar-dropdown--range calendar-dropdown--split"
      [class.calendar-dropdown--split-with-time]="showTimeFields()"
    >
      @if (fromLabel()) {
        <span class="calendar-dropdown__label calendar-dropdown__label--from">{{ fromLabel() }}</span>
      } @else {
        <span class="calendar-dropdown__label calendar-dropdown__label--from" aria-hidden="true"></span>
      }
      <span class="calendar-dropdown__split-gap" aria-hidden="true"></span>
      @if (toLabel()) {
        <span class="calendar-dropdown__label calendar-dropdown__label--to">{{ toLabel() }}</span>
      } @else {
        <span class="calendar-dropdown__label calendar-dropdown__label--to" aria-hidden="true"></span>
      }
      <div
        #fromControl
        class="calendar-dropdown__control"
        [attr.lang]="i18nService.locale()"
      >
        <input
          class="calendar-dropdown__input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          [attr.placeholder]="placeholder()"
          [attr.aria-label]="fromLabel()"
          [value]="fromShellText()"
          (focus)="onRangeFieldFocus('from')"
          (change)="onFromShellTextCommit($event)"
          (keydown.enter)="onFromShellTextCommit($event)"
        />
      </div>
      @if (showTimeFields()) {
        <app-time-field-control
          class="calendar-dropdown__time-field"
          [value]="fromTimeValue()"
          [ariaLabel]="t('map.filter.timespace.fromTime', 'From time')"
          (valueChange)="onFromTimeChange($event)"
        />
      }
      <button
        #pickControl
        type="button"
        class="calendar-dropdown__range-pick"
        [class.calendar-dropdown__range-pick--open]="popoverOpen() && anchorTarget() === 'pick'"
        [attr.aria-label]="t('shared.dateField.openCalendarRange', 'Select date range')"
        [attr.aria-expanded]="popoverOpen() && anchorTarget() === 'pick'"
        (click)="toggleRangePickPopover($event)"
      >
        <span class="material-icons" aria-hidden="true">calendar_today</span>
      </button>
      <div
        #toControl
        class="calendar-dropdown__control"
        [attr.lang]="i18nService.locale()"
      >
        <input
          class="calendar-dropdown__input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          [attr.placeholder]="placeholder()"
          [attr.aria-label]="toLabel()"
          [value]="toShellText()"
          (focus)="onRangeFieldFocus('to')"
          (change)="onToShellTextCommit($event)"
          (keydown.enter)="onToShellTextCommit($event)"
        />
      </div>
      @if (showTimeFields()) {
        <app-time-field-control
          class="calendar-dropdown__time-field"
          [value]="toTimeValue()"
          [ariaLabel]="t('map.filter.timespace.toTime', 'To time')"
          (valueChange)="onToTimeChange($event)"
        />
      }
    </div>
  } @else {
  <div class="calendar-dropdown--range" [class.calendar-dropdown--toolbar]="layout() === 'toolbar'">
    <label class="calendar-dropdown calendar-dropdown__range-field">
      @if (fromLabel()) {
        <span class="calendar-dropdown__label">{{ fromLabel() }}</span>
      }
      <div
        #fromControl
        class="calendar-dropdown__control"
        [class.calendar-dropdown__control--icon-leading]="layout() === 'toolbar'"
        [attr.lang]="i18nService.locale()"
      >
        <button
          type="button"
          class="calendar-dropdown__trigger"
          [attr.aria-label]="t('shared.dateField.openCalendar', 'Open calendar')"
          [attr.aria-expanded]="popoverOpen()"
          (click)="toggleRangePopover($event, 'from')"
        >
          <span class="material-icons" aria-hidden="true">calendar_today</span>
        </button>
        <input
          class="calendar-dropdown__input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          [attr.placeholder]="placeholder()"
          [attr.aria-label]="fromLabel()"
          [value]="fromShellText()"
          (change)="onFromShellTextCommit($event)"
          (keydown.enter)="onFromShellTextCommit($event)"
        />
      </div>
    </label>
    <label class="calendar-dropdown calendar-dropdown__range-field">
      @if (toLabel()) {
        <span class="calendar-dropdown__label">{{ toLabel() }}</span>
      }
      <div
        #toControl
        class="calendar-dropdown__control"
        [class.calendar-dropdown__control--icon-leading]="layout() === 'toolbar'"
        [attr.lang]="i18nService.locale()"
      >
        <button
          type="button"
          class="calendar-dropdown__trigger"
          [attr.aria-label]="t('shared.dateField.openCalendar', 'Open calendar')"
          [attr.aria-expanded]="popoverOpen()"
          (click)="toggleRangePopover($event, 'to')"
        >
          <span class="material-icons" aria-hidden="true">calendar_today</span>
        </button>
        <input
          class="calendar-dropdown__input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          [attr.placeholder]="placeholder()"
          [attr.aria-label]="toLabel()"
          [value]="toShellText()"
          (change)="onToShellTextCommit($event)"
          (keydown.enter)="onToShellTextCommit($event)"
        />
      </div>
    </label>
  </div>
  }
}

@if (popoverOpen()) {
  <app-dropdown-shell
    panelClass="calendar-dropdown-panel"
    placement="end"
    [anchor]="anchorEl()"
    (closeRequested)="onPopoverCloseRequested()"
  >
    @if (mode() === 'single') {
      <app-calendar-picker-panel
        [timeMode]="timeMode()"
        [minDate]="minDate()"
        [maxDate]="maxDate()"
        [disabledDates]="disabledDates()"
        [nullable]="nullable()"
        [draft]="draft()"
        (draftChange)="onDraftChange($event)"
        (done)="onPanelDone()"
        (clear)="onPanelClear()"
        (cancel)="onPopoverCloseRequested()"
      />
    } @else {
      <app-calendar-picker-panel
        pickMode="range"
        [anchorTarget]="anchorTarget()"
        [viewAnchorDate]="panelViewAnchorDate()"
        [minDate]="minDate()"
        [maxDate]="maxDate()"
        [disabledDates]="disabledDates()"
        [nullable]="nullable()"
        [rangeDraft]="rangeDraft()"
        (rangeDraftChange)="onRangeDraftChange($event)"
        (done)="onRangePanelDone()"
        (clear)="onRangePanelClear()"
        (cancel)="onPopoverCloseRequested()"
      />
    }
  </app-dropdown-shell>
}
