<div class="page-grid">
  @if (leftRail()) {
    <div class="page-grid__rail page-grid__rail--left">
      <ng-content select="[pageGridLeft]" />
    </div>
  }

  <div class="page-grid__rail page-grid__rail--center">
    <ng-content select="[pageGridCenter]" />
  </div>

  @if (rightRailOpen()) {
    <div class="page-grid__rail page-grid__rail--right">
      <ng-content select="[pageGridRight]" />
    </div>
  }
</div>
