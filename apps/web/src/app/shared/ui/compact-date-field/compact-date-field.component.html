<label class="compact-date-field">
  @if (label()) {
    <span class="compact-date-field__label">{{ label() }}</span>
  }
  <div class="compact-date-field__control" [attr.lang]="i18nService.locale()">
    <input
      #textField
      hlmInput
      class="compact-date-field__input"
      type="text"
      inputmode="numeric"
      autocomplete="off"
      [attr.placeholder]="placeholder()"
      [attr.aria-label]="ariaLabel() || label()"
      [value]="displayValue()"
      (change)="onTextCommit($event)"
      (keydown.enter)="onTextCommit($event)"
    />
    <button
      type="button"
      hlmBtn
      variant="ghost"
      size="icon-sm"
      class="compact-date-field__calendar-btn"
      [attr.aria-label]="t('shared.dateField.openCalendar', 'Open calendar')"
      [attr.aria-expanded]="calendarOpen()"
      (click)="toggleCalendar($event)"
    >
      <span class="material-icons" aria-hidden="true">calendar_today</span>
    </button>
    @if (calendarOpen()) {
      <div class="compact-date-field__popover">
        <app-captured-date-editor
          [initialDate]="editorInitialDate()"
          [initialTime]="''"
          [dateOnly]="true"
          (save)="onEditorSave($event)"
          (cancel)="closeCalendar()"
        />
      </div>
    }
  </div>
</label>
