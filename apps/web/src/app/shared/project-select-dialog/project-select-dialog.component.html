<!-- Stable state: open — parent-mounted; BrnDialog opens CDK portal on mount @see docs/specs/component/project-select-dialog/project-select-dialog.md -->
<ng-container
  brnDialog
  [state]="'open'"
  [closeOnBackdropClick]="false"
  [aria-label]="title()"
  [aria-modal]="true"
>
  <div hlmDialogOverlay></div>
  <ng-template brnDialogContent>
    <div hlmDialogContent [class]="'max-w-[34rem]'">
      <div hlmDialogHeader>
        <div brnDialogTitle hlmDialogTitle role="heading" aria-level="2">{{ title() }}</div>
        @if (message(); as content) {
          <p brnDialogDescription hlmDialogDescription class="project-select-dialog__message">{{ content }}</p>
        }
      </div>

      <div
        class="project-select-dialog__list overflow-y-auto max-h-64"
        role="listbox"
        [attr.aria-label]="title()"
      >
        @for (option of options(); track option.id) {
          <button
            uiItem
            class="project-select-dialog__option ui-item"
            [class.project-select-dialog__option--active]="selectedId() === option.id"
            type="button"
            role="option"
            [attr.aria-selected]="selectedId() === option.id"
            (click)="selectOption(option.id)"
            (dblclick)="confirmSelection()"
          >
            <span class="project-select-dialog__check material-icons" aria-hidden="true">
              {{ selectedId() === option.id ? 'radio_button_checked' : 'radio_button_unchecked' }}
            </span>
            <span class="project-select-dialog__name">{{ option.name }}</span>
          </button>
        }
      </div>

      <div hlmDialogFooter class="project-select-dialog__actions">
        <button
          hlmBtn
          variant="ghost"
          class="project-select-dialog__cancel"
          type="button"
          brnDialogClose
          (click)="cancelled.emit()"
        >
          {{ cancelLabel() }}
        </button>
        <button
          hlmBtn
          variant="default"
          class="project-select-dialog__confirm"
          type="button"
          [disabled]="!selectedId()"
          (click)="confirmSelection()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </ng-template>
</ng-container>
