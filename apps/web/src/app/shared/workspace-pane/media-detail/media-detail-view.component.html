<!-- MediaDetailViewComponent - full detail view coordinator. -->

@if (error() && !loading()) {
  <div class="detail-error" role="alert">
    <span class="material-icons" aria-hidden="true">error_outline</span>
    <span>{{ error() }}</span>
  </div>
}

@if (loading() && !error()) {
  <div class="detail-main-column detail-main-column--loading" aria-hidden="true">
    <div class="detail-header detail-header--loading">
      <span class="detail-loading-placeholder detail-loading-placeholder--icon"></span>
      <div class="detail-loading-placeholder-group">
        <span class="detail-loading-placeholder detail-loading-placeholder--title"></span>
      </div>
      <span class="detail-loading-placeholder detail-loading-placeholder--icon"></span>
    </div>

    <div class="detail-scroll">
      <div class="detail-content">
        <span class="detail-loading-placeholder detail-loading-placeholder--media" aria-hidden="true"></span>

        <div class="detail-section detail-section--loading">
          <span class="detail-loading-placeholder detail-loading-placeholder--row"></span>
          <span class="detail-loading-placeholder detail-loading-placeholder--row"></span>
          <span class="detail-loading-placeholder detail-loading-placeholder--row"></span>
          <span class="detail-loading-placeholder detail-loading-placeholder--row"></span>
        </div>
      </div>
    </div>
  </div>
}

@if (image() && !loading()) {
  <div class="detail-main-column">
    <app-media-detail-header
      [displayTitle]="displayTitle()"
      [titleValue]="image()!.address_label ?? ''"
      [editingTitle]="editingField() === 'address_label'"
      [showContextMenu]="showContextMenu()"
      [contextActions]="workspaceHeaderActions()"
      (closed)="close()"
      (titleEditRequested)="onTitleEditRequested()"
      (titleSaveRequested)="saveImageField('address_label', $event)"
      (titleEditCancelled)="editingField.set(null)"
      (contextMenuToggled)="toggleContextMenu()"
      (contextMenuClosed)="closeContextMenu()"
      (actionSelected)="onWorkspaceSingleActionSelected($event)"
    />

    <div class="detail-scroll">
      <app-media-detail-media-viewer
        [hasPhoto]="hasPhoto()"
        [canOpenLightbox]="canOpenLightbox()"
        [imageReady]="imageReady()"
        [isImageLoading]="isImageLoading()"
        [thumbState]="thumbState()"
        [fullState]="fullState()"
        [thumbnailUrl]="thumbnailUrl()"
        [fullResUrl]="fullResUrl()"
        [fullResPreloaded]="fullResPreloaded()"
        [displayTitle]="displayTitle()"
        [replacing]="replacing()"
        [replaceError]="replaceError()"
        [acceptTypes]="acceptTypes"
        (slotMeasured)="onDetailSlotMeasured($event)"
        (fileSelected)="onFileSelected($event)"
        (contextMenuRequested)="onThumbnailContextRequested()"
      />

      <div class="detail-content">
        <app-quick-info-chips [chips]="infoChips()" (chipClicked)="onChipClicked($event)" />

        <app-media-detail-inline-section
          [image]="image()!"
          [detailViewLabel]="detailViewLabel()"
          [fileFormatLabel]="fileFormatLabel()"
          [editingField]="editingField()"
          [editDate]="editDate()"
          [editTime]="editTime()"
          [captureDate]="captureDate()"
          [uploadDate]="uploadDate()"
          [projectName]="projectName()"
          [projectOptions]="projectOptions()"
          [selectedProjectIds]="selectedProjectIds()"
          [projectSearch]="projectSearch()"
          [filteredProjectOptions]="filteredProjectOptions()"
          [projectCanCreate]="projectCanCreate()"
          [canAssignMultipleProjects]="canAssignMultipleProjects()"
          [isGpsAssignmentLocked]="isGpsAssignmentLocked()"
          [isImageLike]="isImageLike()"
          (fieldEditRequested)="onDetailFieldEditRequested($event)"
          (fieldSaveRequested)="saveImageField($event.field, $event.value)"
          (editingCancelled)="editingField.set(null)"
          (capturedAtEditRequested)="openCapturedAtEditor()"
          (capturedAtSaved)="saveCapturedAt($event)"
          (projectSearchChanged)="setProjectSearch($event)"
          (projectCreateRequested)="createProjectFromSearch()"
          (projectMembershipToggled)="toggleProjectMembership($event)"
        />

        <app-media-detail-location-section
          [image]="image()!"
          [fullAddress]="fullAddress()"
          [editingField]="editingField()"
          [isGpsAssignmentLocked]="isGpsAssignmentLocked()"
          [isCorrected]="isCorrected()"
          [saving]="saving()"
          (fieldEditRequested)="onDetailFieldEditRequested($event)"
          (fieldSaveRequested)="saveImageField($event.field, $event.value)"
          (editingCancelled)="editingField.set(null)"
          (addressSuggestionApplied)="applyAddressSuggestion($event)"
          (addressClearRequested)="confirmClearAddress()"
          (copyCoordinatesRequested)="copyCoordinates()"
          (mapLocationPickRequested)="requestMapLocationPick()"
          (revertCoordinatesRequested)="confirmRevertCoordinates()"
        />

        <app-metadata-section
          [entries]="metadata()"
          [allKeyNames]="allMetadataKeyNames()"
          (valueChanged)="saveMetadata($event.entry, $event.newValue)"
          (entryRemoved)="confirmRemoveMetadata($event)"
          (entryAdded)="addMetadata($event.key, $event.value)"
        />

        <app-detail-actions
          [actions]="workspaceSingleActions()"
          (actionSelected)="onWorkspaceSingleActionSelected($event)"
        />
      </div>
    </div>
  </div>
}

@if (destructiveConfirmCopy(); as confirmCopy) {
  <app-confirm-dialog
    [title]="confirmCopy.title"
    [message]="confirmCopy.message"
    [confirmLabel]="confirmCopy.confirmLabel"
    [cancelLabel]="t('workspace.imageDetail.confirm.cancel', 'Cancel')"
    [danger]="true"
    (confirmed)="onDestructiveConfirmed()"
    (cancelled)="cancelDestructiveConfirm()"
  />
}
