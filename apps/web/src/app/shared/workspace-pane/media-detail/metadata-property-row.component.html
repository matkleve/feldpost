<div
  class="detail-row"
  [class.detail-row--editing]="editing()"
  [attr.data-detail-active-editor]="editing() ? 'metadata' : null"
>
  <span class="detail-row-action detail-row-action--l2" aria-hidden="true"></span>
  @if (editing()) {
    <span class="detail-row-action detail-row-action--l1" aria-hidden="true"></span>
    <div class="detail-row__center">
      <span class="material-icons detail-row__icon" aria-hidden="true">label</span>
      <span class="detail-row__label" data-i18n-skip [title]="metaKey()">{{ metaKey() }}</span>
      <input
        #editInput
        class="detail-row__field-input detail-row__field-slot"
        type="text"
        [value]="metaValue()"
        [attr.aria-label]="t('workspace.metadata.row.editPrefix', 'Edit') + ' ' + metaKey()"
        (keydown.enter)="commitEdit($event)"
        (keydown.escape)="cancelEdit()"
        (blur)="commitEdit($event)"
      />
    </div>
    <button
      hlmBtn
      variant="ghost"
      size="icon"
      class="detail-row-action detail-row-action--r1 detail-row-action--save"
      type="button"
      [attr.aria-label]="t('workspace.metadata.row.save.aria', 'Save') + ' ' + metaKey()"
      [attr.title]="t('workspace.metadata.row.save.title', 'Save')"
      (mousedown)="$event.preventDefault()"
      (click)="commitEditFromSave()"
    >
      <span class="material-icons" aria-hidden="true">check</span>
    </button>
    <button
      hlmBtn
      variant="ghost"
      size="icon"
      class="detail-row-action detail-row-action--r2 detail-row-action--danger"
      type="button"
      [attr.aria-label]="t('workspace.imageDetail.action.cancelEdit.aria', 'Cancel edit')"
      [attr.title]="t('workspace.imageDetail.action.cancelEdit.title', 'Cancel edit')"
      (click)="cancelEdit()"
    >
      <span class="material-icons" aria-hidden="true">close</span>
    </button>
  } @else {
    <button
      hlmBtn
      variant="ghost"
      size="icon"
      class="detail-row-action detail-row-action--l1"
      type="button"
      [attr.aria-label]="t('workspace.metadata.row.editPrefix', 'Edit') + ' ' + metaKey()"
      [attr.title]="t('workspace.metadata.row.editPrefix', 'Edit') + ' ' + metaKey()"
      (click)="startEdit()"
    >
      <span class="material-icons" aria-hidden="true">edit</span>
    </button>
    <div class="detail-row__center">
      <span class="material-icons detail-row__icon" aria-hidden="true">label</span>
      <span class="detail-row__label" data-i18n-skip [title]="metaKey()">{{ metaKey() }}</span>
      <button class="detail-row__field-trigger" type="button" (click)="startEdit()">
        {{ metaValue() || t('workspace.metadata.row.value.empty', '-') }}
      </button>
    </div>
    <span class="detail-row-action detail-row-action--r1" aria-hidden="true"></span>
    <button
      hlmBtn
      variant="ghost"
      size="icon"
      class="detail-row-action detail-row-action--r2 detail-row-action--danger"
      type="button"
      [attr.aria-label]="t('workspace.metadata.row.removePrefix', 'Remove') + ' ' + metaKey()"
      [attr.title]="t('workspace.metadata.row.removeTitle', 'Remove metadata')"
      (click)="deleteRequested.emit()"
    >
      <span class="material-icons" aria-hidden="true">close</span>
    </button>
  }
</div>
