@if (enabled()) {
  <button
    #actionButton
    hlmBtn
    variant="ghost"
    size="icon"
    [class]="
      'detail-row-action detail-row-action--' +
      slot() +
      (armed()
        ? ' detail-row-action--armed'
        : idleIcon() === 'delete'
          ? ' detail-row-action--danger'
          : ' detail-row-action--remove')
    "
    type="button"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    [attr.title]="title()"
    [attr.data-state]="armed() ? 'armed' : 'idle'"
    (pointerdown)="onActionPointerDown($event)"
    (click)="onClick($event)"
  >
    <span class="material-icons" aria-hidden="true">{{ armed() ? armedIcon() : idleIcon() }}</span>
  </button>
}
