<input
  [id]="fileInputId"
  type="file"
  [accept]="acceptTypes()"
  class="visually-hidden"
  aria-hidden="true"
  (change)="onFileSelected($event)"
/>

@if (hasPhoto()) {
  <div class="detail-media__container">
    <div
      class="detail-media__slot"
      [style.--media-aspect-ratio]="mediaAspectRatio()"
      (transitionend)="onSlotGeometryTransitionEnd($event)"
    >
      <app-media-display
        #mediaPreview
        class="detail-media__preview"
        downloadContext="detail"
        slotGeometry="intrinsic"
        [mediaId]="mediaId()"
        [storagePath]="storagePath()"
        [thumbnailPath]="thumbnailPath()"
        [previewGenerationStatus]="previewGenerationStatus()"
        [originalFilename]="originalFilename()"
        [aspectRatio]="aspectRatioHint()"
        [contentObjectPosition]="contentObjectPosition()"
        maxWidth="min(100%, calc(40rem / 1.618))"
        maxHeight="33vh"
        (aspectRatioChange)="onMediaAspectRatioChange($event)"
      />

      <button
        type="button"
        class="detail-media__open"
        [disabled]="!canOpenLightbox()"
        [attr.aria-label]="
          t('workspace.imageDetail.action.viewFullSizeMedia.aria', 'View full-size media')
        "
        (click)="openLightbox()"
        (contextmenu)="requestContextMenu($event)"
      ></button>
    </div>

    <button
      hlmBtn
      variant="ghost"
      size="icon"
      class="detail-media__edit-btn"
      type="button"
      [attr.aria-label]="t('workspace.imageDetail.action.replaceMedia.aria', 'Replace media')"
      [attr.title]="t('workspace.imageDetail.action.replaceMedia.title', 'Replace media')"
      [disabled]="replacing()"
      (click)="triggerFileInput()"
    >
      @if (replacing()) {
        <span class="detail-media__edit-btn__spinner" aria-hidden="true"></span>
      } @else {
        <span class="material-icons" aria-hidden="true">edit</span>
      }
    </button>

    @if (replaceError()) {
      <div class="detail-replace-error" role="alert">{{ replaceError() }}</div>
    }
  </div>
} @else {
  <div class="detail-upload-prompt">
    <div class="detail-upload-prompt__placeholder">
      <span class="detail-upload-prompt__icon" aria-hidden="true"></span>
      <span class="detail-upload-prompt__text">{{
        t('workspace.imageDetail.noMediaAttached', 'No media attached')
      }}</span>
    </div>
    <button
      hlmBtn
      variant="default"
      class="detail-upload-prompt__button"
      type="button"
      [iconPlacement]="replacing() ? 'start' : undefined"
      [disabled]="replacing()"
      (click)="triggerFileInput()"
    >
      @if (replacing()) {
        <span class="detail-upload-prompt__spinner" aria-hidden="true"></span>
      }
      {{ t('workspace.imageDetail.action.uploadMedia', 'Upload media') }}
    </button>
    @if (replaceError()) {
      <div class="detail-replace-error" role="alert">{{ replaceError() }}</div>
    }
  </div>
}

@if (showLightbox() && lightboxImageUrl(); as imageUrl) {
  <app-photo-lightbox
    [imageUrl]="imageUrl"
    [alt]="displayTitle()"
    (closed)="showLightbox.set(false)"
  />
}
