<div class="detail-section">
  <p class="detail-section__label">{{ t('workspace.metadata.section.title', 'Metadata') }}</p>

  <div class="detail-section__rows">
    @for (entry of entries(); track entry.metadataKeyId) {
      <app-metadata-property-row
        [key]="entry.key"
        [keyType]="entry.keyType"
        [value]="entry.value"
        (valueChanged)="valueChanged.emit({ entry, newValue: $event })"
        (deleteRequested)="entryRemoved.emit(entry)"
      />
    }

    @if (showAddForm()) {
      <div
        class="detail-row add-metadata-row detail-row--editing"
        data-detail-active-editor="metadata-add"
      >
        <span class="detail-row-action detail-row-action--l2" aria-hidden="true"></span>
        <span class="detail-row-action detail-row-action--l1" aria-hidden="true"></span>
        <div class="detail-row__center metadata-add-row__center">
          <div class="metadata-add-row__controls">
            <app-metadata-type-picker
              class="metadata-add-row__type"
              [valueType]="draft().valueType"
              [locked]="draft().propertyMode === 'existing'"
              [open]="openPanel() === 'type'"
              (openChange)="onTypeOpenChange($event)"
              (valueTypeChange)="onValueTypeChange($event)"
            />
            <app-metadata-property-picker
              class="metadata-add-row__name"
              [definitions]="metadataKeyDefinitions()"
              [excludedKeyIds]="excludedKeyIds()"
              [valueType]="draft().valueType"
              [keyName]="draft().keyName"
              [metadataKeyId]="draft().metadataKeyId"
              [open]="openPanel() === 'property'"
              (openChange)="onPropertyOpenChange($event)"
              (definitionSelected)="onDefinitionSelected($event)"
              (draftNameChange)="onDraftNameChange($event)"
            />
            <div class="metadata-add-row__value" (keydown.enter)="saveAdd()">
              <app-metadata-value-editor
                [valueType]="draft().valueType"
                [value]="draft().value"
                [ariaLabel]="t('workspace.metadata.input.value.aria', 'New metadata value')"
                (valueChange)="onDraftValueChange($event)"
              />
              @if (valueError()) {
                <p class="metadata-add-row__error" role="alert">{{ valueError() }}</p>
              }
              @if (duplicateError()) {
                <p class="metadata-add-row__error" role="alert">{{ duplicateError() }}</p>
              }
            </div>
          </div>
        </div>
        <button
          hlmBtn
          variant="ghost"
          size="icon"
          class="detail-row-action detail-row-action--r1 add-metadata-confirm detail-row-action--confirm"
          type="button"
          [attr.aria-label]="t('workspace.metadata.action.save.aria', 'Save new metadata')"
          (click)="saveAdd()"
        >
          <span class="material-icons" aria-hidden="true">check</span>
        </button>
        <button
          hlmBtn
          variant="ghost"
          size="icon"
          class="detail-row-action detail-row-action--r2 detail-row-action--danger"
          type="button"
          [attr.aria-label]="t('workspace.imageDetail.action.cancelEdit.aria', 'Cancel')"
          (click)="cancelAdd()"
        >
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
      </div>
    } @else {
      <div class="detail-row add-metadata-row">
        <span class="detail-row-action detail-row-action--l2" aria-hidden="true"></span>
        <span class="detail-row-action detail-row-action--l1" aria-hidden="true"></span>
        <div class="detail-row__center">
          <button
            class="detail-row__field-trigger metadata-add-row__collapsed-trigger"
            type="button"
            [attr.aria-label]="t('workspace.metadata.action.add', 'Add metadata')"
            (click)="openAddForm()"
          >
            <span class="material-icons detail-row__icon" aria-hidden="true">add</span>
            <span class="detail-row__label metadata-add-row__collapsed-label">{{
              t('workspace.metadata.action.add', 'Add metadata')
            }}</span>
          </button>
        </div>
        <span class="detail-row-action detail-row-action--r1" aria-hidden="true"></span>
        <span class="detail-row-action detail-row-action--r2" aria-hidden="true"></span>
      </div>
    }
  </div>
</div>
