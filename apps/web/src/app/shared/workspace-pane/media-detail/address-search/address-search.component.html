@if (active()) {
  <div class="address-search__input-wrap">
    <span class="material-icons address-search__icon" aria-hidden="true">search</span>
    <input
      #addressSearchInput
      hlmInput
      class="address-search__input"
      type="text"
      [placeholder]="t('workspace.addressSearch.placeholder', 'Search address...')"
      [attr.aria-label]="t('workspace.addressSearch.aria.search', 'Search for an address')"
      [value]="query()"
      (input)="onInput(addressSearchInput.value)"
      (keydown.escape)="cancel()"
      (keydown.enter)="selectFirst()"
    />
    @if (query()) {
      <button
        hlmBtn
        variant="ghost"
        size="icon"
        class="address-search__clear"
        type="button"
        [attr.aria-label]="t('workspace.addressSearch.aria.clear', 'Clear search')"
        (click)="query.set(''); addressSearchInput.focus()"
      >
        <span class="material-icons" aria-hidden="true">close</span>
      </button>
    }
  </div>

  @if (suggestions().length > 0) {
    <div class="address-search__results option-menu-surface flex flex-col">
      @for (suggestion of suggestions(); track suggestion.addressLabel) {
        <button hlmMenuItem class="w-full" type="button" (click)="apply(suggestion)">
          <span class="material-icons shrink-0 text-base text-muted-foreground" aria-hidden="true">place</span>
          <span class="min-w-0 flex-1 text-left">{{ suggestion.addressLabel }}</span>
        </button>
      }
    </div>
  }

  @if (loading()) {
    <div class="address-search__loading">
      {{ t('workspace.addressSearch.loading', 'Searching...') }}
    </div>
  }
} @else {
  <button
    class="address-search__trigger inline-flex min-h-8 w-full items-center gap-2 rounded-sm py-1 text-left text-sm text-muted-foreground hover:bg-accent hover:text-foreground"
    type="button"
    (click)="open()"
  >
    <span class="material-icons shrink-0 text-base" aria-hidden="true">search</span>
    <span class="min-w-0 flex-1">{{
      currentAddress() || t('workspace.addressSearch.placeholder', 'Search address...')
    }}</span>
  </button>
}
