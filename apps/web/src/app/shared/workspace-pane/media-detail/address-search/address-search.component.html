@if (active()) {
  <div class="address-search__input-wrap">
    <span class="material-icons address-search__icon" aria-hidden="true">search</span>
    <input
      #addressSearchInput
      uiInputControl
      class="address-search__input"
      type="text"
      [placeholder]="t('workspace.addressSearch.placeholder', 'Search address...')"
      [attr.aria-label]="t('workspace.addressSearch.aria.search', 'Search for an address')"
      [value]="query()"
      (input)="onInput(addressSearchInput.value)"
      (keydown.escape)="cancel()"
      (keydown.enter)="selectFirst()"
    />
    @if (query()) {
      <button
        uiIconButtonGhost
        class="address-search__clear icon-btn-ghost"
        type="button"
        [attr.aria-label]="t('workspace.addressSearch.aria.clear', 'Clear search')"
        (click)="query.set(''); addressSearchInput.focus()"
      >
        <span class="material-icons" aria-hidden="true">close</span>
      </button>
    }
  </div>

  @if (suggestions().length > 0) {
    <div class="address-search__results option-menu-surface dd-items">
      @for (suggestion of suggestions(); track suggestion.addressLabel) {
        <button class="dd-item" type="button" (click)="apply(suggestion)">
          <span class="material-icons dd-item__icon" aria-hidden="true">place</span>
          <span class="dd-item__label">{{ suggestion.addressLabel }}</span>
        </button>
      }
    </div>
  }

  @if (loading()) {
    <div class="address-search__loading">
      {{ t('workspace.addressSearch.loading', 'Searching...') }}
    </div>
  }
} @else {
  <button class="address-search__trigger dd-item dd-item--muted" type="button" (click)="open()">
    <span class="material-icons dd-item__icon" aria-hidden="true">search</span>
    <span class="dd-item__label">{{
      currentAddress() || t('workspace.addressSearch.placeholder', 'Search address...')
    }}</span>
  </button>
}
