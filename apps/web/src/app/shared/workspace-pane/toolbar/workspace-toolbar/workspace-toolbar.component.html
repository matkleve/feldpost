<div
  class="workspace-toolbar"
  role="toolbar"
  [attr.aria-label]="t('workspace.toolbar.aria.controls', 'Workspace controls')"
>
  @for (btn of buttons(); track btn.id) {
    <button
      type="button"
      hlmBtn
      variant="outline"
      size="sm"
      class="workspace-toolbar__menu-trigger"
      [class.workspace-toolbar__menu-trigger--open]="activeDropdown() === btn.id"
      [attr.data-active]="btn.active() ? 'true' : null"
      [attr.aria-label]="btn.label"
      [attr.title]="btn.label"
      [attr.aria-expanded]="activeDropdown() === btn.id"
      [attr.aria-haspopup]="true"
      (click)="toggleDropdown(btn.id, $event); $event.stopPropagation()"
    >
      <span
        data-dd-part="icon"
        class="material-icons workspace-toolbar__menu-trigger-icon"
        aria-hidden="true"
        >{{ btn.icon }}</span
      >
      <span data-dd-part="label" class="workspace-toolbar__menu-trigger-label">{{ btn.label }}</span>
      <span
        data-dd-part="chevron"
        class="material-icons workspace-toolbar__menu-trigger-chevron"
        aria-hidden="true"
        >expand_more</span
      >
    </button>
  }

  <span class="workspace-toolbar__spacer" aria-hidden="true"></span>

  <div class="workspace-toolbar__size-control workspace-toolbar__size-control--full" hlmPillToggle size="sm">
    <div
      hlmToggleGroup
      size="sm"
      brnToggleGroup
      type="single"
      [nullable]="false"
      [value]="thumbnailSizePreset()"
      (valueChange)="onThumbnailSizeToggleChange($event)"
      [attr.aria-label]="t('workspace.toolbar.size.aria', 'Thumbnail size')"
    >
      @for (opt of cardVariantToggleOptions(); track opt.id) {
        <button
          type="button"
          hlmToggleGroupItem
          size="icon"
          brnToggleGroupItem
          [value]="opt.id"
          [attr.aria-label]="opt.ariaLabel || opt.label"
          [attr.title]="opt.title || opt.label"
        >
          <span class="material-icons" aria-hidden="true">{{ opt.icon }}</span>
        </button>
      }
    </div>
  </div>

  <div class="workspace-toolbar__size-control workspace-toolbar__size-control--compact">
    <div class="workspace-toolbar__size-control-track" hlmToggleGroup size="sm">
      <button
        type="button"
        hlmToggleGroupItem
        brnToggleGroupItem
        size="icon"
        [attr.aria-label]="compactCardVariantToggleTitle()"
        [attr.title]="compactCardVariantToggleTitle()"
        (click)="cycleThumbnailSizePreset()"
      >
        <span class="material-icons" aria-hidden="true">{{ currentCardVariantToggleOption()?.icon }}</span>
      </button>
    </div>
  </div>
</div>

@if (activeDropdown()) {
  <app-dropdown-shell
    [panelClass]="toolbarDropdownPanelClass(activeDropdown())"
    [anchor]="dropdownAnchor()"
    [minWidth]="toolbarDropdownPositionWidthPx(activeDropdown())"
    [outsideCloseEnabled]="!isDragging()"
    (closeRequested)="closeDropdown()"
  >
    @switch (activeDropdown()) {
      @case ('grouping') {
        <app-grouping-dropdown
          [activeGroupings]="activeGroupings()"
          [availableProperties]="availableGroupings()"
          (groupingsChanged)="onGroupingsChanged($event.active)"
          (dragStarted)="onDragStarted()"
          (dragEnded)="onDragEnded()"
        />
      }
      @case ('filter') {
        <app-filter-dropdown />
      }
      @case ('sort') {
        <app-sort-dropdown (sortChanged)="onSortChanged($event)" />
      }
      @case ('projects') {
        <app-projects-dropdown (projectsChanged)="onProjectsChanged($event)" />
      }
    }
  </app-dropdown-shell>
}
