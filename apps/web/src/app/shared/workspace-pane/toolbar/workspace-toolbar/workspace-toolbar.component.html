<div
  class="workspace-toolbar"
  role="toolbar"
  [attr.aria-label]="t('workspace.toolbar.aria.controls', 'Workspace controls')"
>
  @for (btn of buttons(); track btn.id) {
    <button
      type="button"
      hlmBtn
      variant="outline"
      size="sm"
      iconPlacement="end"
      class="workspace-toolbar__menu-trigger min-w-0 shrink"
      [class.workspace-toolbar__menu-trigger--open]="activeDropdown() === btn.id"
      [attr.data-state]="btn.active() ? 'on' : null"
      [attr.aria-expanded]="activeDropdown() === btn.id"
      [attr.aria-haspopup]="true"
      (click)="toggleDropdown(btn.id, $event); $event.stopPropagation()"
    >
      <span data-dd-part="label" class="min-w-0 flex-1 truncate text-left">{{ btn.label }}</span>
      <span
        data-dd-part="chevron"
        class="material-icons shrink-0 text-base leading-none transition-transform duration-150 ease-out"
        aria-hidden="true"
        >expand_more</span>
    </button>
  }

  <span class="workspace-toolbar__spacer" aria-hidden="true"></span>

  <div class="workspace-toolbar__size-control" hlmPillToggle size="sm">
    <div
      hlmToggleGroup
      brnToggleGroup
      type="single"
      [nullable]="false"
      [value]="thumbnailSizePreset()"
      (valueChange)="onThumbnailSizeToggleChange($event)"
      [attr.aria-label]="t('workspace.toolbar.size.aria', 'Thumbnail size')"
    >
      @for (opt of cardVariantToggleOptions(); track opt.id) {
        <button
          type="button"
          hlmToggleGroupItem
          size="icon"
          brnToggleGroupItem
          [value]="opt.id"
          [attr.aria-label]="opt.ariaLabel || opt.label"
          [attr.title]="opt.title || opt.label"
        >
          <span class="material-icons" aria-hidden="true">{{ opt.icon }}</span>
        </button>
      }
    </div>
  </div>
</div>

@if (activeDropdown()) {
  <app-dropdown-shell
    [panelClass]="toolbarDropdownPanelClass(activeDropdown())"
    [top]="dropdownTop()"
    [left]="dropdownLeft()"
    [outsideCloseEnabled]="!isDragging()"
    (closeRequested)="closeDropdown()"
  >
    @switch (activeDropdown()) {
      @case ('grouping') {
        <app-grouping-dropdown
          [activeGroupings]="activeGroupings()"
          [availableProperties]="availableGroupings()"
          (groupingsChanged)="onGroupingsChanged($event.active)"
          (dragStarted)="onDragStarted()"
          (dragEnded)="onDragEnded()"
        />
      }
      @case ('filter') {
        <app-filter-dropdown />
      }
      @case ('sort') {
        <app-sort-dropdown (sortChanged)="onSortChanged($event)" />
      }
      @case ('projects') {
        <app-projects-dropdown (projectsChanged)="onProjectsChanged($event)" />
      }
    }
  </app-dropdown-shell>
}
