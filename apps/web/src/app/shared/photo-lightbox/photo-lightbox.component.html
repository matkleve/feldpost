<div class="lightbox" role="presentation">
  <button
    class="lightbox__backdrop"
    type="button"
    aria-label="Close"
    (click)="closed.emit()"
  ></button>

  <div class="lightbox__dialog" role="dialog" aria-modal="true" aria-label="Full-size photo">
    <button class="lightbox__close" type="button" aria-label="Close" (click)="closed.emit()">
      <span class="material-icons" aria-hidden="true">close</span>
    </button>
    <img class="lightbox__image" [src]="imageUrl()" [alt]="alt()" />
  </div>
</div>
