<div
  class="text-input-dialog-overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="text-input-dialog-title"
  (click)="cancelled.emit()"
>
  <div uiContainer class="text-input-dialog ui-container" (click)="$event.stopPropagation()">
    <h2 id="text-input-dialog-title" class="text-input-dialog__title">{{ title() }}</h2>

    @if (message(); as content) {
      <p class="text-input-dialog__message">{{ content }}</p>
    }

    <input
      #nameInput
      uiInputControl
      class="text-input-dialog__input ui-input-control"
      type="text"
      [value]="initialValue()"
      [placeholder]="placeholder()"
      [attr.aria-label]="title()"
      maxlength="120"
      autofocus
      (keydown.escape)="cancelled.emit()"
      (keydown.enter)="emitConfirmed(nameInput.value)"
    />

    <div class="text-input-dialog__actions">
      <button
        uiButton
        uiButtonGhost
        class="text-input-dialog__cancel ui-button ui-button--ghost"
        type="button"
        (click)="cancelled.emit()"
      >
        {{ cancelLabel() }}
      </button>
      <button
        uiButton
        uiButtonPrimary
        class="text-input-dialog__confirm ui-button ui-button--primary"
        type="button"
        [disabled]="nameInput.value.trim().length === 0"
        (click)="emitConfirmed(nameInput.value)"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
