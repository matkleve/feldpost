<div class="toast-surface" data-toast-surface>
  <span class="toast-indicator" aria-hidden="true"></span>
  <span class="toast-message">{{ item().message }}</span>
  @if (item().action; as action) {
    <button
      type="button"
      class="toast-action"
      hlmBtn
      variant="ghost"
      size="sm"
      (click)="onAction()"
    >
      {{ action.label }}
    </button>
  }
  <button
    type="button"
    class="toast-dismiss"
    aria-label="Dismiss notification"
    (click)="onDismiss()"
  >
    <span class="toast-dismiss__glyph" aria-hidden="true">×</span>
  </button>
</div>
