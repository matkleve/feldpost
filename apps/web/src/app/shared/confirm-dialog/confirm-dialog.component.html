<!-- Stable state: open — parent-mounted; BrnDialog opens CDK portal on mount @see docs/specs/component/confirm-dialog/confirm-dialog.md -->
<ng-container
  brnDialog
  [state]="'open'"
  [closeOnBackdropClick]="false"
  [aria-label]="title()"
  [aria-modal]="true"
>
  <div hlmDialogOverlay></div>
  <ng-template brnDialogContent>
    <div hlmDialogContent [class]="'max-w-[20rem]'">
      <div hlmDialogHeader>
        <div brnDialogTitle hlmDialogTitle role="heading" aria-level="2">{{ title() }}</div>
        <p brnDialogDescription hlmDialogDescription>{{ message() }}</p>
      </div>
      <div hlmDialogFooter>
        <button
          hlmBtn
          variant="ghost"
          class="dialog__cancel"
          type="button"
          brnDialogClose
          (click)="cancelled.emit()"
        >
          {{ cancelLabel() }}
        </button>
        <button
          hlmBtn
          [variant]="danger() ? 'destructive' : 'default'"
          class="dialog__confirm"
          type="button"
          brnDialogClose
          (click)="confirmed.emit()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </ng-template>
</ng-container>
