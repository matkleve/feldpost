<div class="dialog-overlay" role="dialog" aria-modal="true" [attr.aria-label]="title()">
  <div class="dialog">
    <h2 class="dialog__title">{{ title() }}</h2>
    <p class="dialog__body">{{ message() }}</p>
    <div class="dialog__actions">
      <button
        uiButton
        uiButtonGhost
        class="dialog__cancel ui-button ui-button--ghost"
        type="button"
        (click)="cancelled.emit()"
      >
        {{ cancelLabel() }}
      </button>
      <button
        uiButton
        class="dialog__confirm ui-button"
        [class.ui-button--danger]="danger()"
        [class.ui-button--primary]="!danger()"
        type="button"
        (click)="confirmed.emit()"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
